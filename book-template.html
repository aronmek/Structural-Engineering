<!-- ===== Exam Engine ===== -->
<script>
"use strict";
// Exam data is provided by exams.js (window.SeExamData), embedded by bundle.ps1.
// Each chapter slug maps to { title, sets: [ { id, questions: [ ... ] } ] }
// Question types: mcq {q, o:[options], a:correctIndex, e:explanation}
//                 num {q, n:correctValue, t:tolerance, e:explanation}

window.SeExams = (function () {
  const STORAGE_KEY = 'book.exam.v1';

  function load() {
    try {
      const raw = sessionStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  }
  function save(state) {
    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }
  function recordAttempt(slug, setId, score, total, answers) {
    const state = load();
    if (!state[slug]) state[slug] = {};
    if (!state[slug][setId]) state[slug][setId] = { attempts: [], best: 0, bestPct: 0 };
    const pct = total ? Math.round(100 * score / total) : 0;
    state[slug][setId].attempts.push({
      ts: Date.now(),
      score, total, pct,
      answers,
    });
    if (pct > state[slug][setId].bestPct) {
      state[slug][setId].bestPct = pct;
      state[slug][setId].best = score;
    }
    save(state);
  }
  function clearAll() {
    sessionStorage.removeItem(STORAGE_KEY);
  }

  function findExam(headingText) {
    const data = window.SeExamData || {};
    // Try exact slug, then with normalized whitespace
    const slug = headingText.toLowerCase().replace(/[^a-z0-9\s-]/g, '').trim().replace(/\s+/g, '-').substring(0, 80);
    return { slug, data: data[slug] };
  }

  function buildPanel(slug, examDef) {
    const wrap = document.createElement('section');
    wrap.className = 'exam';
    wrap.dataset.slug = slug;

    const head = document.createElement('div');
    head.className = 'x-head';
    head.innerHTML = '<h3>📝 Chapter Exam</h3><span class="x-badge">3 Sets · Auto-graded · Retake any time</span>';
    wrap.appendChild(head);

    const desc = document.createElement('div');
    desc.className = 'x-desc';
    desc.textContent = 'Test your understanding. Choose a set, answer all questions, then submit. Explanations appear after grading. Your best score per set is saved this session.';
    wrap.appendChild(desc);

    const sets = document.createElement('div');
    sets.className = 'x-sets';
    const state = load();
    const setStates = examDef.sets.map(s => ({
      id: s.id,
      title: s.title || ('Set ' + s.id),
      questions: s.questions,
      result: (state[slug] && state[slug][s.id]) || null,
    }));
    const buttons = [];
    setStates.forEach((s, idx) => {
      const btn = document.createElement('button');
      btn.className = 'x-set-btn';
      const meta = s.result
        ? ('Best: ' + s.result.bestPct + '%  ·  Attempts: ' + s.result.attempts.length)
        : 'Not attempted';
      btn.innerHTML = '<span>' + s.title + '</span><span class="x-set-meta">' + meta + '</span>';
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSet(s);
      });
      buttons.push(btn);
      sets.appendChild(btn);
    });
    wrap.appendChild(sets);

    const quiz = document.createElement('div');
    quiz.className = 'x-quiz';
    wrap.appendChild(quiz);

    function renderSet(s) {
      quiz.innerHTML = '';
      const answers = new Array(s.questions.length).fill(null);
      const qEls = [];
      s.questions.forEach((q, qi) => {
        const qEl = document.createElement('div');
        qEl.className = 'x-q';
        const num = document.createElement('div');
        num.className = 'x-q-num';
        num.textContent = 'Question ' + (qi + 1) + ' of ' + s.questions.length;
        qEl.appendChild(num);
        const txt = document.createElement('div');
        txt.className = 'x-q-text';
        txt.textContent = q.q;
        qEl.appendChild(txt);
        if (q.o) {
          // MCQ
          q.o.forEach((opt, oi) => {
            const lbl = document.createElement('label');
            lbl.className = 'x-opt';
            const inp = document.createElement('input');
            inp.type = 'radio';
            inp.name = 'q' + slug + s.id + '_' + qi;
            inp.value = oi;
            inp.addEventListener('change', () => {
              answers[qi] = oi;
              qEl.querySelectorAll('.x-opt').forEach(x => x.classList.remove('selected'));
              lbl.classList.add('selected');
            });
            lbl.appendChild(inp);
            lbl.appendChild(document.createTextNode(' ' + opt));
            qEl.appendChild(lbl);
          });
        } else if (typeof q.n === 'number') {
          // numeric
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.inputMode = 'decimal';
          inp.className = 'x-num-input';
          inp.placeholder = 'Numeric answer';
          inp.addEventListener('input', () => {
            const v = parseFloat(inp.value.replace(',', '.'));
            answers[qi] = isFinite(v) ? v : null;
          });
          qEl.appendChild(inp);
          qEl.dataset.numeric = '1';
        }
        // explanation slot
        const ex = document.createElement('div');
        ex.className = 'x-explain';
        ex.style.display = 'none';
        qEl.appendChild(ex);
        qEls.push(qEl);
        quiz.appendChild(qEl);
      });

      const actions = document.createElement('div');
      actions.className = 'x-actions';
      const submitBtn = document.createElement('button');
      submitBtn.className = 'x-btn';
      submitBtn.textContent = 'Submit Answers';
      const retakeBtn = document.createElement('button');
      retakeBtn.className = 'x-btn secondary';
      retakeBtn.textContent = 'Retake (clear answers)';
      retakeBtn.style.display = 'none';
      const result = document.createElement('div');
      result.className = 'x-result';
      result.style.display = 'none';

      submitBtn.addEventListener('click', () => {
        let score = 0;
        s.questions.forEach((q, qi) => {
          const qEl = qEls[qi];
          qEl.classList.add('graded');
          let correct = false;
          if (q.o) {
            const opts = qEl.querySelectorAll('.x-opt');
            const sel = answers[qi];
            opts.forEach((optEl, oi) => {
              if (oi === q.a) optEl.classList.add('correct');
              else if (oi === sel) optEl.classList.add('wrong');
              optEl.querySelector('input').disabled = true;
            });
            correct = (sel === q.a);
          } else if (typeof q.n === 'number') {
            const inp = qEl.querySelector('.x-num-input');
            inp.disabled = true;
            const tol = q.t || Math.abs(q.n) * 0.01 || 0.01;
            const ans = answers[qi];
            correct = (ans !== null && Math.abs(ans - q.n) <= tol);
            inp.classList.add(correct ? 'correct' : 'wrong');
          }
          if (correct) score++;
          qEl.classList.add(correct ? 'correct-tag-yes' : 'correct-tag-no');
          const ex = qEl.querySelector('.x-explain');
          ex.innerHTML = '<span class="x-correct-tag">' +
            (correct ? '✓ Correct' : '✗ Incorrect') + '</span>' +
            (q.o ? ('Answer: <strong>' + q.o[q.a] + '</strong>. ') : ('Answer: <strong>' + q.n + '</strong>. ')) +
            (q.e || '');
          ex.style.display = 'block';
        });
        const total = s.questions.length;
        const pct = Math.round(100 * score / total);
        result.classList.add(pct >= 70 ? 'pass' : 'fail');
        result.innerHTML = (pct >= 70 ? '🏆 Passed' : '📚 Review needed') +
          '<div class="x-stat">Score: ' + score + ' / ' + total + ' (' + pct + '%) · ' +
          (pct >= 70 ? 'Solid grasp of this chapter.' : 'Re-read the chapter sections covering missed questions, then retake.') +
          '</div>';
        result.style.display = 'block';
        submitBtn.disabled = true;
        submitBtn.style.display = 'none';
        retakeBtn.style.display = 'inline-block';
        recordAttempt(slug, s.id, score, total, answers);
        // refresh button label to show new best
        const stateNow = load();
        const setStateNow = stateNow[slug] && stateNow[slug][s.id];
        const meta = setStateNow ? ('Best: ' + setStateNow.bestPct + '%  ·  Attempts: ' + setStateNow.attempts.length) : 'Not attempted';
        const idx = setStates.findIndex(x => x.id === s.id);
        if (idx >= 0) {
          buttons[idx].innerHTML = '<span>' + s.title + '</span><span class="x-set-meta">' + meta + '</span>';
          buttons[idx].classList.add('active');
        }
      });
      retakeBtn.addEventListener('click', () => renderSet(s));

      actions.appendChild(submitBtn);
      actions.appendChild(retakeBtn);
      quiz.appendChild(actions);
      quiz.appendChild(result);
    }

    return wrap;
  }

  function mountAll(root) {
    if (!window.SeExamData) return;
    const headings = root.querySelectorAll('h2[id]');
    headings.forEach(h => {
      const slug = h.id;
      const examDef = window.SeExamData[slug];
      if (!examDef || !examDef.sets || !examDef.sets.length) return;
      // Skip non-chapter h2s (e.g., front-matter)
      if (!/chapter/i.test(h.textContent)) return;
      // Insert exam panel at the end of this chapter's section (before next h2 or end)
      let next = h.nextElementSibling;
      const parent = h.parentNode;
      const panel = buildPanel(slug, examDef);
      // walk forward to find next h2 (or end)
      let cursor = next;
      while (cursor && cursor.tagName !== 'H2') cursor = cursor.nextElementSibling;
      if (cursor) parent.insertBefore(panel, cursor);
      else parent.appendChild(panel);
    });
  }

  function chaptersWithExams() {
    if (!window.SeExamData) return [];
    return Object.keys(window.SeExamData);
  }

  function renderProgress(root) {
    const data = window.SeExamData || {};
    const state = load();
    const slugs = Object.keys(data);
    const wrap = document.createElement('div');
    wrap.className = 'progress-wrap';
    wrap.innerHTML = '<h1>📊 Progress Dashboard</h1>';

    // Aggregate stats
    let totalSets = 0, attempted = 0, passed = 0, totalAttempts = 0;
    let avgPctSum = 0, avgPctCount = 0;
    const weakChapters = [];
    const rows = [];
    slugs.forEach(slug => {
      const def = data[slug];
      if (!def) return;
      const chapTitle = def.title || slug;
      const partTitle = def.part || '';
      const chapState = state[slug] || {};
      let chapBest = -1;
      let chapAttempts = 0;
      const setCells = def.sets.map(s => {
        totalSets++;
        const ss = chapState[s.id];
        if (ss && ss.attempts.length) {
          attempted++;
          totalAttempts += ss.attempts.length;
          if (ss.bestPct >= 70) passed++;
          avgPctSum += ss.bestPct;
          avgPctCount++;
          chapAttempts += ss.attempts.length;
          if (ss.bestPct > chapBest) chapBest = ss.bestPct;
          return { id: s.id, pct: ss.bestPct, attempts: ss.attempts.length };
        }
        return { id: s.id, pct: -1, attempts: 0 };
      });
      rows.push({ slug, chapTitle, partTitle, setCells, chapBest, chapAttempts });
      if (chapBest >= 0 && chapBest < 70) weakChapters.push({ slug, chapTitle, chapBest });
    });

    // Summary cards
    const summary = document.createElement('div');
    summary.className = 'progress-summary';
    function card(label, value, sub) {
      const c = document.createElement('div');
      c.className = 'progress-card';
      c.innerHTML = '<div class="pc-label">' + label + '</div><div class="pc-value">' + value + '</div><div class="pc-sub">' + (sub || '') + '</div>';
      return c;
    }
    const avgPct = avgPctCount ? Math.round(avgPctSum / avgPctCount) : 0;
    summary.appendChild(card('Sets attempted', attempted + ' / ' + totalSets, 'across ' + slugs.length + ' chapters'));
    summary.appendChild(card('Sets passed (≥70%)', passed, attempted ? Math.round(100 * passed / attempted) + '% pass rate' : ''));
    summary.appendChild(card('Total attempts', totalAttempts, ''));
    summary.appendChild(card('Average best %', avgPct ? avgPct + '%' : '—', 'across attempted sets'));
    summary.appendChild(card('Weak chapters', weakChapters.length, weakChapters.length ? 'See list below' : 'None yet'));
    wrap.appendChild(summary);

    // Actions
    const actions = document.createElement('div');
    actions.className = 'progress-actions';
    const exportBtn = document.createElement('button');
    exportBtn.className = 'x-btn secondary';
    exportBtn.textContent = '⬇ Export progress (JSON)';
    exportBtn.addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'progress.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    });
    actions.appendChild(exportBtn);
    const clearBtn = document.createElement('button');
    clearBtn.className = 'x-btn secondary';
    clearBtn.textContent = '🗑 Clear all progress';
    clearBtn.addEventListener('click', () => {
      if (confirm('Clear all exam progress for this session?')) {
        clearAll();
        renderProgress(root.querySelector('.progress-wrap')?.parentNode || root);
        // Re-render
        root.innerHTML = '';
        renderProgress(root);
      }
    });
    actions.appendChild(clearBtn);
    wrap.appendChild(actions);

    // Weak chapters callout
    if (weakChapters.length) {
      const weak = document.createElement('div');
      weak.innerHTML = '<h2>📕 Areas to brush up</h2>';
      const ul = document.createElement('ul');
      weakChapters.forEach(w => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.textContent = w.chapTitle + ' (best ' + w.chapBest + '%)';
        a.href = '#' + w.slug;
        a.addEventListener('click', (e) => { e.preventDefault(); navigate(findFileForSlug(w.slug), w.slug); });
        li.appendChild(a);
        ul.appendChild(li);
      });
      weak.appendChild(ul);
      wrap.appendChild(weak);
    }

    // Per-chapter table
    const table = document.createElement('table');
    table.className = 'progress-table';
    table.innerHTML = '<thead><tr><th>Chapter</th><th>Set A</th><th>Set B</th><th>Set C</th><th>Best</th><th>Attempts</th><th></th></tr></thead>';
    const tbody = document.createElement('tbody');
    rows.forEach(r => {
      const tr = document.createElement('tr');
      if (r.chapBest >= 0 && r.chapBest < 70) tr.classList.add('weak');
      else if (r.chapBest >= 90) tr.classList.add('strong');
      else if (r.chapBest < 0) tr.classList.add('untaken');

      const titleTd = document.createElement('td');
      const link = document.createElement('a');
      link.textContent = r.chapTitle;
      link.style.cursor = 'pointer';
      link.addEventListener('click', () => navigate(findFileForSlug(r.slug), r.slug));
      titleTd.appendChild(link);
      const subt = document.createElement('div');
      subt.style.cssText = 'font-size:11px;color:var(--text-muted)';
      subt.textContent = r.partTitle;
      titleTd.appendChild(subt);
      tr.appendChild(titleTd);

      r.setCells.forEach(sc => {
        const td = document.createElement('td');
        td.className = 'pset';
        if (sc.pct < 0) {
          td.textContent = '—';
        } else {
          const bar = document.createElement('div');
          bar.className = 'progress-bar' + (sc.pct >= 90 ? ' strong' : sc.pct < 70 ? ' weak' : '');
          const fill = document.createElement('span');
          fill.style.width = sc.pct + '%';
          bar.appendChild(fill);
          td.appendChild(bar);
          td.appendChild(document.createTextNode(sc.pct + '% (' + sc.attempts + ')'));
        }
        tr.appendChild(td);
      });

      const bestTd = document.createElement('td');
      bestTd.textContent = r.chapBest >= 0 ? (r.chapBest + '%') : '—';
      tr.appendChild(bestTd);

      const attTd = document.createElement('td');
      attTd.textContent = r.chapAttempts;
      tr.appendChild(attTd);

      const goTd = document.createElement('td');
      const goBtn = document.createElement('a');
      goBtn.textContent = 'Open ›';
      goBtn.style.cssText = 'color:var(--accent);cursor:pointer;font-size:12px;';
      goBtn.addEventListener('click', () => navigate(findFileForSlug(r.slug), r.slug));
      goTd.appendChild(goBtn);
      tr.appendChild(goTd);

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);

    root.appendChild(wrap);
  }

  function findFileForSlug(slug) {
    const c = state.chapterIndex.find(x => x.slug === slug);
    return c ? c.fileId : (state.manifest.files[0] && state.manifest.files[0].id);
  }

  return { mountAll, renderProgress, clearAll };
})();
</script>
