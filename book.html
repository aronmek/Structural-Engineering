## Chapter 39 — Running the Analysis

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Analysis** | "uh-NAL-ih-sis" | Solve for forces, displacements | Run Analysis |
| **Convergence** | (see Ch 33) | Iterative solution settles | Nonlinear cases |
| **Mode shape** | — | A natural vibration pattern | Modal analysis |
| **Period** | "PEER-ee-ud" | Time for one full vibration cycle | $T$ in seconds |
| **Mass source** | — | What ETABS counts as inertial mass | DL + 0.25 LL etc. |
| **P-Delta** | "P-DEL-tuh" | Second-order effects from gravity on displaced shape | Tall buildings |

### B. Concept Introduction

Pressing **Analyze > Run Analysis** triggers the entire numerical process: assemble $[K]$, assemble $\{F\}$, solve $\{d\}$, recover element forces, perform modal analysis if requested. ETABS prints a log; reading the log catches errors early.

### C. The Physics Behind It

The matrix equation $[K]\{d\} = \{F\}$ from Chapter 30 is solved. For modal/dynamic analysis, ETABS additionally solves the eigenvalue problem $[K]\{\phi\} = \omega^2 [M]\{\phi\}$ to find natural frequencies $\omega$ and mode shapes $\{\phi\}$.

### D. The Math

Periods. For a building of height $h_n$ (m), code estimate (ASCE 7):
- Steel moment frame: $T_a = 0.072 h_n^{0.8}$
- Concrete moment frame: $T_a = 0.047 h_n^{0.9}$

For tutorial building $h_n = 4.5 + 4 \cdot 3.5 = 18.5$ m, RC MRF:
$T_a = 0.047 \cdot 18.5^{0.9} = 0.047 \cdot 13.95 = 0.656\ \mathrm{s}$

ETABS will report a similar (slightly larger) computed period from the actual model.

### E. Structural Engineering Application

**Pre-run checklist:**
1. Mass source defined (typically DL + reductions per code)
2. Diaphragm assigned to every floor
3. Base restraints assigned
4. Sufficient modes requested (until cumulative mass participation > 90% per direction)
5. P-Delta enabled for buildings > 4 stories or where required by code

### F. ETABS Connection — The Mini-Task

> **Mini-Task: Configure and run.**
>
> 1. **Define > Mass Source** → DL + 0.25 LL (or per code)
> 2. **Define > Load Cases > Modal** → set 12 modes (good starting number)
> 3. **Analyze > Set Active Degrees of Freedom** → for typical 3D building, set XY+RZ as primary lateral DOFs
> 4. **Analyze > Run Analysis** (F5)
> 5. Watch the log for warnings/errors
> 6. After completion: **Display > Show Tables > Modal Information > Modal Periods and Frequencies**
> 7. **Display > Show Mode Shapes** to visualize modes 1, 2, 3

### G. Common Mistakes

1. **Too few modes.** Stopping at 6 modes when 12 are needed → mass participation < 90%, dynamic results unreliable.
2. **Wrong mass source.** Including full LL inflates mass; excluding self-weight underestimates it.
3. **Skipping P-Delta.** For tall or slender frames, ignoring P-Delta can underpredict drift by 20%+.

### H. Chapter Practice Task — Period Check

> **Scenario:** Run modal analysis on the tutorial building. Compare ETABS-computed $T_1$ to the code estimate $T_a = 0.656\ \mathrm{s}$.
>
> **Worked Solution:** ETABS-computed period is typically 1.4× to 1.8× $T_a$ for a bare frame (since code formulas include nonstructural stiffness contributions). Expected: $T_1 \approx 1.0$–$1.3\ \mathrm{s}$. If much larger (say > 2 s), investigate — likely missing fixity, missing diaphragm, or unrealistic section.

## Chapter 40 — Reading and Interpreting Results

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Drift** | — | Lateral displacement difference between floors | Story drift |
| **Reaction** | "ree-AK-shun" | Force at a support | Base reaction |
| **Demand** | "dee-MAND" | Required capacity from loads | $M_u, V_u, P_u$ |
| **Capacity** | "kuh-PASS-ih-tee" | Available strength | $\phi M_n, \phi V_n$ |
| **Demand-to-capacity ratio (D/C)** | — | $\le 1.0$ means OK | Member check |
| **Envelope** | "EN-veh-lohp" | Worst-case across all combinations | Design forces |

### B. Concept Introduction

After analysis, ETABS produces two kinds of output: **diagrams** (visual) and **tables** (numerical). You verify equilibrium first (forces in = forces out), then look at deflections, drifts, and member forces.

### C. The Physics Behind It

Newton's third law: every applied load equals the sum of reactions. ETABS reports both; their match is the simplest correctness check. Drift limits (typically $\le h/200$ to $h/400$ depending on code/use) ensure occupant comfort and damage control.

### D. The Math

For a 5-story building with story height 3.5 m, drift limit 0.020 (2%):
$\Delta_{max,allowed} = 0.020 \cdot 3500 = 70\ \mathrm{mm}$ per story

If ETABS reports max story drift = 0.015 (1.5%), that's $52.5\ \mathrm{mm}$ → OK.

### E. Structural Engineering Application

**Output verification workflow:**

1. **Display > Show Tables > Joint Reactions** → sum vertical reactions, compare to total weight
2. **Display > Show Tables > Story Drift** → check < limit
3. **Display > Show Forces/Stresses > Frames** → review BMD, SFD, axial diagrams
4. **Design > Concrete Frame Design > Display Design Info > Longitudinal Reinforcement** → for concrete buildings

### F. ETABS Connection — The Mini-Task

> **Mini-Task: Verify and interpret.**
>
> 1. **Display > Show Tables > Analysis > Joint Output > Reactions** → sum FZ for combo 1.0DL → should equal total dead weight
> 2. **Display > Show Tables > Story Output > Story Drifts** → check Max-Drift columns; flag any > h/250
> 3. **Display > Show Forces/Stresses > Frames > Moment 3-3** → for combo $1.2DL + 1.6LL$ → identify max moment column and beam
> 4. **Display > Show Deformed Shape** → for EQX → confirm building leans in X direction with no kinks

### G. Common Mistakes

1. **Reading raw forces, not the envelope.** Always view results under the worst combination, not just DL.
2. **Ignoring sign conventions.** Compression negative or positive depends on settings.
3. **Eyeballing displacements.** ETABS exaggerates the deformed shape by a scale factor — read tabular values, not the picture.

### H. Chapter Practice Task — Equilibrium Check + Drift Check

> **Scenario:** For the tutorial building, verify (a) total vertical reaction = total DL + LL, (b) max story drift under EQX < $h_{sx}/250$.
>
> **Worked Solution:**
> Total weight ≈ slabs + beams + columns + finishes + LL (per combo).
> If slab area = 24 × 15 = 360 m², 5 stories, slab DL ≈ 0.18 × 25 = 4.5 kPa, finishes 1.5 kPa → 6 kPa × 360 × 5 = 10,800 kN slabs alone.
> Sum reactions in ETABS table — should match within 1%.
> Drift under EQX: read max value; check < 3500/250 = 14 mm.

## Chapter 41 — Design in ETABS

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Design code** | — | Standard prescribing capacities | ACI 318-19, AISC 360-22 |
| **Auto select** | — | List of sections ETABS picks from | Steel design |
| **Reinforcement ratio $\rho$** | "ROH" | Steel area / concrete area | RC design |
| **Phi factor $\phi$** | "FY" | Strength reduction factor | $\phi M_n$ |
| **Interaction diagram** | — | Capacity envelope for $P$-$M$ combinations | Column design |

### B. Concept Introduction

After analysis, ETABS can perform code-based design checks. For concrete: rebar quantities and detailing; for steel: passes/fails plus optimal section selection from an auto-list.

### C. The Physics Behind It

Capacity must exceed demand. For concrete columns: $P_u, M_u$ from analysis must lie inside the $\phi P_n$ vs $\phi M_n$ interaction diagram. For steel beams: $M_u \le \phi M_n$ where $\phi M_n$ depends on lateral-torsional buckling unbraced length.

### D. The Math

Concrete beam, simplified:
$\phi M_n = \phi A_s f_y (d - a/2)$
$a = A_s f_y / (0.85 f'_c b)$

For $b = 300$, $d = 540$, $A_s = 1500\ \mathrm{mm^2}$ (≈ 5Ø20), $f_y = 500$, $f'_c = 30$, $\phi = 0.9$:
$a = 1500 \cdot 500 / (0.85 \cdot 30 \cdot 300) = 750{,}000 / 7650 = 98\ \mathrm{mm}$
$\phi M_n = 0.9 \cdot 1500 \cdot 500 \cdot (540 - 49) = 0.9 \cdot 1500 \cdot 500 \cdot 491$
$= 331{,}425{,}000\ \mathrm{N \cdot mm} = 331\ \mathrm{kN \cdot m}$

### E. Structural Engineering Application

ETABS computes $\phi M_n$ per code automatically — your job is to (a) provide correct material/section data, (b) set the right code, (c) review the output.

### F. ETABS Connection — The Mini-Task

> **Mini-Task: Run concrete design.**
>
> 1. **Design > Concrete Frame Design > Select Design Combo** → choose strength combos
> 2. **Design > Concrete Frame Design > Start Design / Check** of Structure
> 3. **Design > Concrete Frame Design > Display Design Info** → choose **Longitudinal Reinforcement** (for required $A_s$)
> 4. View elements color-coded by reinforcement amount
> 5. Click any beam/column to see detailed design report
> 6. For shear: re-run with **Display > Shear Reinforcement**

### G. Common Mistakes

1. **Designing without re-running analysis after section changes.** Stale results.
2. **Ignoring the "OS" (over-stressed) flag.** Red elements need bigger sections or more reinforcement.
3. **Trusting design output without checking detailing.** ETABS gives required $A_s$; you must still pick bar sizes that fit, satisfy spacing, and provide minimum steel per code.

### H. Chapter Practice Task — Design the Tutorial Building

> **Scenario:** Run concrete design for all members of the tutorial building. Identify any over-stressed elements. Report the heaviest reinforcement column.
>
> **Worked Solution:** Run **Start Design/Check**. Use **Display Design Info** → flag any failing elements. Use **Display > Show Tables > Concrete Frame Design > Summary** to find the column with maximum longitudinal $A_s$.

## Chapter 42 — Complete Worked Example: 5-Story RC Building

### A. Word Bank

(All terms used here are defined in earlier chapters.)

### B. Concept Introduction

This chapter is one continuous worked example tying every previous chapter together. We walk from blank ETABS to a fully designed 5-story reinforced concrete office building.

### C. Project Description

- **Geometry:** 4 bays × 6 m in X (24 m), 3 bays × 5 m in Y (15 m), 5 stories: ground 4.5 m + 4 stories 3.5 m each (total height 18.5 m)
- **Material:** C30 concrete, B500 rebar
- **Sections:** Columns C-50x50, Beams B-30x60 (interior) and B-25x50 (perimeter), Slab S-180
- **Loads:** DL = self + 1.5 kPa finishes; LL = 2.4 kPa typical, 1.0 kPa roof; Seismic per ASCE 7-22, $S_S = 1.5g$, $S_1 = 0.6g$, Site Class D, $R = 8$
- **Code:** ACI 318-19 design, ASCE 7-22 loads

### D. Step-by-Step

**Step 1 — Setup.**
- File > New Model. Units kN, m, °C. Codes: ACI 318-19, ASCE 7-22.
- Custom grid: X = 4×6 m, Y = 3×5 m. Stories: 5. Story 1 = 4.5 m, others = 3.5 m. Save as `Tutorial-5StoryRC.edb`.

**Step 2 — Materials.**
- C30: $f'_c = 30$ MPa, density 25 kN/m³.
- B500: $f_y = 500$ MPa.

**Step 3 — Sections.**
- C-50x50 (column 500×500 with 8Ø20 + Ø8/200 ties)
- B-30x60 (beam 300×600)
- B-25x50 (beam 250×500)
- S-180 (slab 180 mm shell-thin)

**Step 4 — Build geometry.**
- Plan Story 1: draw columns at all 5×4 = 20 grid intersections.
- Replicate columns to Story 5.
- Draw beams along all gridlines on each story (interior B-30x60, perimeter B-25x50).
- Draw slabs filling each bay on stories 1–5.
- Plan Base: select all base joints → Assign > Joint > Restraints > Fixed.
- Select all slabs each story → Assign > Shell > Diaphragm > New (rigid). Use D1, D2, D3, D4, D5.

**Step 5 — Loads.**
- Define patterns: DL (self-weight × 1), LL, EQX (seismic, ASCE 7), EQY (seismic Y).
- Apply slab finishes 1.5 kPa to all slabs in DL.
- Apply LL: 2.4 kPa stories 1–4, 1.0 kPa roof slab.
- Configure EQX/EQY auto-seismic: $S_S = 1.5g$, $S_1 = 0.6g$, Site D, $R = 8$, $I_e = 1.0$.
- Define Mass Source: DL + 0.25 LL.
- Define Load Combinations > Add Default Design Combos > ACI/ASCE.

**Step 6 — Analysis.**
- Define > Load Cases > Modal: 12 modes.
- Analyze > Run Analysis (F5).

**Step 7 — Results review.**
- Display > Show Tables > Modal Periods. Expected $T_1 \approx 1.0$–$1.3$ s.
- Display > Show Tables > Story Drifts. For each story, check max drift < $h_{sx}/250$ (i.e., < 14 mm at 3.5 m floors).
- Display > Show Tables > Joint Reactions. Sum FZ for 1.0 DL ≈ total dead weight (self + finishes ≈ 11{,}000–13{,}000 kN ballpark).
- Display > Show Forces/Stresses > Frames > Moment 3-3 under combo 1.2DL+1.6LL.

**Step 8 — Design.**
- Design > Concrete Frame Design > Start Design.
- Display > Design Info > Longitudinal Reinforcement.
- Identify the heaviest-reinforced column (likely a ground-floor corner or perimeter column under combined seismic + gravity).
- Identify any over-stressed members; if any, increase section size and re-run.

**Step 9 — Documentation.**
- File > Print Tables > include input + design summaries.
- Save final `.edb`.

### E. Expected Results (sanity ranges)

| Quantity | Expected Range |
|----------|---------------|
| $T_1$ | 1.0–1.3 s |
| Total DL reaction | ~11,000–13,000 kN |
| Max story drift (EQX) | < 14 mm (h/250) |
| Base shear EQX | ~10–15% of total weight |
| Max column $A_s$ (ground floor) | 4000–6000 mm² |

### F. ETABS Connection

This chapter *is* the ETABS connection. The point is that every menu path you've practiced in Chapters 34–41 is used end-to-end here.

### G. Common Mistakes (project-level)

1. **Skipping diaphragms.** Lateral results become nonsense.
2. **Wrong seismic parameters.** $S_S$, $S_1$, Site Class — these are read from a code map; using defaults gives meaningless seismic forces.
3. **Failing to converge mass participation > 90%.** Re-run with more modes.

## Chapter 43 — Common ETABS Mistakes and How to Fix Them

### A. Word Bank

| Word | Pronunciation | Plain English Meaning |
|------|---------------|----------------------|
| **Warning** | "WORN-ing" | Non-fatal issue ETABS flags |
| **Error** | "AYR-er" | Fatal — analysis stopped |
| **Mechanism** | "MEK-uh-niz-um" | Unstable structure (singular $[K]$) |
| **Instability** | "in-stuh-BIL-ih-tee" | Same as mechanism |
| **Mass participation** | — | Fraction of total mass active in modes |

### B. Concept Introduction

This is your troubleshooting reference. When ETABS errors out or gives suspicious results, work through this checklist.

### C. The Common Issues

**Issue 1: "Structure is unstable."**
- *Cause:* Missing supports / restraints; mechanism in geometry; release pattern that disconnects an element.
- *Fix:* In Plan view of Base, verify all base joints have restraints assigned. Check for orphan joints. Use Show Reactions colored by Restraint to spot missing supports.

**Issue 2: First mode period is enormous (e.g., > 5 s for a 5-story building).**
- *Cause:* Diaphragm not assigned; columns not connected to beams; section properties dramatically off.
- *Fix:* Verify diaphragm at each floor. **Display > Show Section Cuts > Connectivity** for stray elements. Check section dimensions.

**Issue 3: Reactions don't sum to applied load.**
- *Cause:* Self-weight multiplier set on multiple patterns; missing loads; load applied to wrong combo.
- *Fix:* Check **Define > Load Patterns** — only ONE pattern (typically DL) should have self-weight multiplier 1; others 0. Recompute by hand for one combo.

**Issue 4: Mass participation < 90%.**
- *Cause:* Too few modes requested.
- *Fix:* **Define > Load Cases > Modal** — increase modes to 24, 36, or more for tall buildings.

**Issue 5: Drift is huge under seismic.**
- *Cause:* Soft story; missing shear walls; columns under-sized; P-Delta not enabled.
- *Fix:* Add lateral system (shear walls, braced bays). Enable P-Delta. Re-size columns.

**Issue 6: Concrete design says "OS" (over-stressed) on every column.**
- *Cause:* Wrong code, wrong rebar grade, wrong $\phi$ factors, undersized sections, or auto-design combos missing.
- *Fix:* Verify Design Code in **Options > Design Preferences**. Verify section reinforcement was specified. Try larger column.

**Issue 7: Beams have huge axial force.**
- *Cause:* Beam connected to slab as part of diaphragm — axial force "stuck" in beam due to membrane locking.
- *Fix:* Use **Frame > Auto Lateral Loads > Output > Section Forces** to confirm; or set frame "Auto Hinge" to release axial; usually a model artifact, not a real concern unless very large.

**Issue 8: Modal results show modes with no movement.**
- *Cause:* Mass not properly distributed (only at certain joints).
- *Fix:* Check Mass Source, ensure DL contributes mass; verify diaphragm spans all relevant joints.

### D. The Math (back-of-envelope sanity)

When in doubt, do these hand checks:
- Total DL reaction ≈ slab DL × area × stories + finishes × area × stories + frame self-weight (small fraction)
- Period (RC frame): $T_1 \approx 0.1 \cdot N_{stories}$ → 5-story ≈ 0.5–0.7 s code estimate, 1.0–1.3 s computed
- Base shear seismic: $V_b \approx C_s \cdot W$ where $C_s$ ≈ 0.05–0.20 for typical zones

### E. Structural Engineering Application

When a model behaves oddly, before changing anything, do this:
1. Save a backup
2. Hand-compute the simplest sanity check above
3. Compare to ETABS output
4. The discrepancy tells you where to look

### F. ETABS Connection

Every issue above maps to a specific menu path:
- Restraints → **Assign > Joint > Restraints**
- Mass source → **Define > Mass Source**
- Diaphragms → **Assign > Shell > Diaphragm**
- Modes → **Define > Load Cases > Modal**
- Design code → **Options > Design Preferences**

### G. Common Mistakes (meta!)

The biggest meta-mistake: **trusting ETABS output without sanity checking**. Software will dutifully solve a wrong model. Your judgment, not ETABS, is the final filter.

### H. Chapter Practice Task — Diagnose a Broken Model

> **Scenario:** Take your completed tutorial building and intentionally break one thing at a time. Re-run after each break and observe the symptom:
> 1. Remove all restraints from one base column
> 2. Delete the diaphragm from one story
> 3. Set self-weight multiplier on both DL *and* LL
> 4. Reduce modes to 3
>
> **Worked Solution:** Document each symptom in a journal:
> - (1) "Structure is unstable" error or huge displacement at unrestrained joint
> - (2) Floor flexes weirdly; modal periods change for that floor
> - (3) Reactions ~2× expected
> - (4) Mass participation < 60%; dynamic results unreliable
>
> Then restore each correctly. This builds debugging instinct.

### I. Chapter Summary Table

| Symptom | Likely Cause | Fix |
|---------|--------------|-----|
| "Unstable" | Missing restraints | Add base fixity |
| Huge $T_1$ | No diaphragm | Add rigid diaphragm |
| Wrong reactions | Self-weight on multiple patterns | Set multiplier = 1 only on DL |
| Low mass participation | Too few modes | Increase to 24+ |
| Huge drift | Soft story / under-sized | Add walls; re-size |
| OS on every member | Wrong code/material | Recheck preferences |

# Closing — Where to Go Next

You have built, analyzed, and designed a real 5-story reinforced concrete building from a foundation of arithmetic and algebra. From here:

1. **Repeat the Chapter 42 example** with different geometries (taller, irregular plan, with shear walls). Each repetition deepens your intuition.
2. **Add steel structures.** Most of the workflow is the same; only material, sections, and design code differ.
3. **Add nonlinear analysis** — pushover, time history. Master linear static first; ETABS treats nonlinear as a layered extension.
4. **Read the codes** (ACI 318, AISC 360, ASCE 7) cover-to-cover. ETABS implements these — knowing them lets you verify ETABS instead of trusting blindly.
5. **Sit with experienced engineers.** Ask why they chose what they chose. Patterns that took years to build can be transferred in conversation.

Engineering is not memorization. It is the slow accumulation of judgment, built on a foundation you now possess.

Good luck. Keep your hand calculations. They will outlive any software version.

# Appendix B — Useful Formulas Cheat Sheet

**Statics**
- $\Sigma F_x = 0,\ \Sigma F_y = 0,\ \Sigma M = 0$
- Simply supported UDL: $R = wL/2$, $M_{\max} = wL^2/8$, $V_{\max} = wL/2$
- Cantilever tip-load $P$: $M_{fix} = PL$, $\delta_{tip} = PL^3/(3EI)$
- Cantilever UDL: $M_{fix} = wL^2/2$, $\delta_{tip} = wL^4/(8EI)$
- Simply supported UDL deflection: $\delta_{mid} = 5wL^4/(384EI)$

**Stress / Strain**
- $\sigma = P/A$ axial
- $\sigma = My/I$ bending
- $\tau = VQ/(Ib)$ shear (or $\tau \approx 1.5 V/A$ for rectangle)
- $\varepsilon = \sigma/E$
- $\delta = PL/(AE)$ axial elongation

**Geometry**
- Rectangle: $A = bh$, $I = bh^3/12$
- Circle: $A = \pi r^2$, $I = \pi r^4/4$
- Parallel axis: $I = I_c + A d^2$

**Concrete (ACI)**
- $E_c = 4700\sqrt{f'_c}$ MPa
- Min flexural steel: $A_{s,\min} = 1.4 b d / f_y$ (or $0.25 \sqrt{f'_c}\, bd / f_y$)

**Seismic (simplified)**
- $T_a$ (RC MRF) = $0.047 h_n^{0.9}$ s
- $V_b = C_s W$
- $C_s = S_{DS}/(R/I_e)$ (capped/floored per code)

**Drift limits** (typical)
- Office: $h_{sx}/200$ to $h_{sx}/400$
- Hospital, critical: tighter

function slugify(s) {
  return String(s).toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .substring(0, 80);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function $(sel, root) { return (root || document).querySelector(sel); }

// Called once after marked loads. Marked versions differ here: some pass a token
// object, others pass (text, depth, raw). Support both callback shapes.
function initMarked() {
  marked.use({
    gfm: true,
    breaks: false,
    renderer: {
      heading(arg, level, raw) {
        let text = '';
        let depth = 2;
        let source = '';
        if (arg && typeof arg === 'object' && !Array.isArray(arg)) {
          text = arg.text || arg.raw || '';
          depth = arg.depth || 2;
          source = arg.raw || arg.text || text;
        } else {
          text = String(arg || '');
          depth = level || 2;
          source = raw || text;
        }
        const id = slugify(source.replace(/^#{1,6}\s*/, ''));
        return `<h${depth} id="${id}">${text}</h${depth}>\n`;
      }
    }
  });
}

function renderMarkdown(md) {

    '<div class="page-break"></div>'
  );

  return marked.parse(cleaned);
}

// Build key → entry lookup. Longer keys override shorter ones naturally via scan order.
const mathLookup = new Map();
for (const e of mathDict) {
  for (const k of e.keys) mathLookup.set(k, e);
}
// Keys sorted longest-first for greedy scan (specific beats general)
const mathKeys = [...mathLookup.keys()].sort((a, b) => b.length - a.length);

function stripMdInline(s) {
  return String(s || '')
    .replace(/<[^>]+>/g, '')
    .replace(/\$+/g, '')
    .replace(/\*\*/g, '')
    .replace(/__/g, '')
    .replace(/`/g, '')
    .replace(/\\mathrm\{([^}]+)\}/g, '$1')
    .replace(/\\text\{([^}]+)\}/g, '$1')
    .replace(/\\/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function splitMdRow(line) {
  return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
}

function isMdDividerRow(line) {
  return /^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
}

function addGlossaryEntry(map, entry) {
  const name = stripMdInline(entry.name);
  const desc = stripMdInline(entry.desc);
  if (!name || !desc) return;
  const key = name.toLowerCase();
  if (map.has(key)) return;
  map.set(key, {
    keys: (entry.keys || [name]).map(stripMdInline).filter(Boolean),
    symbol: stripMdInline(entry.symbol || name),
    pronounce: stripMdInline(entry.pronounce || ''),
    name,
    desc,
    slug: entry.slug || null,
  });
}

function buildGlossary() {
  const entries = new Map();
  for (const f of state.manifest.files) {
    const md = getRawMd(f.id);
    if (!md) continue;
    const lines = md.split('\n');
    let chapterSlug = '';
    for (let i = 0; i < lines.length; i++) {
      const heading = lines[i].match(/^##\s+(.+)$/);
      if (heading) chapterSlug = slugify(heading[1]);
      if (!/^\s*\|/.test(lines[i]) || i + 1 >= lines.length || !isMdDividerRow(lines[i + 1])) continue;

      const headers = splitMdRow(lines[i]).map(h => stripMdInline(h).toLowerCase());
      const rows = [];
      i += 2;
      while (i < lines.length && /^\s*\|/.test(lines[i])) {
        rows.push(splitMdRow(lines[i]));
        i++;
      }
      i--;

      const wordIdx = headers.indexOf('word');
      const pronIdx = headers.indexOf('pronunciation');
      const meaningIdx = headers.indexOf('plain english meaning');
      const usedIdx = headers.indexOf('used in') >= 0 ? headers.indexOf('used in') : headers.indexOf('example');
      if (wordIdx >= 0 && meaningIdx >= 0) {
        for (const row of rows) {
          const word = row[wordIdx];
          const meaning = row[meaningIdx];
          const used = usedIdx >= 0 ? row[usedIdx] : '';
          addGlossaryEntry(entries, {
            name: word,
            symbol: word,
            pronounce: pronIdx >= 0 ? row[pronIdx] : '',
            desc: meaning + (used ? ' Used in: ' + used : ''),
            slug: chapterSlug,
          });
        }
        continue;
      }

      const quantityIdx = headers.indexOf('quantity');
      const symbolIdx = headers.indexOf('symbol');
      const unitIdx = headers.indexOf('unit');
      const conversionIdx = headers.indexOf('conversion');
      if (quantityIdx >= 0 && symbolIdx >= 0) {
        for (const row of rows) {
          addGlossaryEntry(entries, {
            name: row[quantityIdx],
            symbol: row[symbolIdx],
            desc: (unitIdx >= 0 ? 'Units: ' + row[unitIdx] + '. ' : '') + (conversionIdx >= 0 ? row[conversionIdx] : ''),
            keys: [row[quantityIdx], row[symbolIdx]],
            slug: chapterSlug,
          });
        }
        continue;
      }

      const conceptIdx = headers.indexOf('concept');
      const notationIdx = headers.indexOf('notation');
      const engIdx = headers.indexOf('engineering use');
      if (conceptIdx >= 0 && notationIdx >= 0) {
        for (const row of rows) {
          addGlossaryEntry(entries, {
            name: row[conceptIdx],
            symbol: row[notationIdx],
            desc: engIdx >= 0 ? row[engIdx] : row[notationIdx],
            keys: [row[conceptIdx], row[notationIdx]],
            slug: chapterSlug,
          });
        }
      }
    }
  }
  state.glossary = [...entries.values()].filter(e => e.name.length > 1);
}

/**
 * Scan latex and return ALL distinct matching entries (up to 5).
 * Uses greedy longest-first match; each consumed key region is blanked
 * to prevent sub-key double-match (e.g. \sigma not re-matched inside \sigma_c).
 */
function lookupAllMath(latex) {
  const seen = new Set();
  const result = [];
  let remaining = latex;
  for (const k of mathKeys) {
    if (result.length >= 5) break;
    if (!remaining.includes(k)) continue;
    const entry = mathLookup.get(k);
    if (seen.has(entry)) continue;
    seen.add(entry);
    result.push(entry);
    remaining = remaining.split(k).join('\x00'); // blank matched region
  }
  return result;
}

let ttHideTimer = null;
function cancelHideTT() { if (ttHideTimer) { clearTimeout(ttHideTimer); ttHideTimer = null; } }
function scheduleHideTT() { ttHideTimer = setTimeout(hideMathTooltip, 220); }

function hideMathTooltip() {
  const tip = document.getElementById('math-tooltip');
  if (tip) tip.classList.remove('tt-visible');
}

/**
 * Render one card per entry inside the tooltip and position it near anchor.
 */
function showMathTooltip(entries, anchor) {
  cancelHideTT();
  const tip = document.getElementById('math-tooltip');

  tip.innerHTML = entries.map(entry => {
    let jumpHtml = '';
    if (entry.slug) {
      const ch = state.chapterIndex.find(c => c.slug === entry.slug);
      if (ch) {
        const label = ch.title.replace(/^Chapter\s+\S+\s*[\u2014\-]\s*/i, '');
        jumpHtml = `<a class="tt-jump" data-file="${escapeHtml(ch.fileId)}" data-slug="${escapeHtml(entry.slug)}">\u21AA ${escapeHtml(label)}</a>`;
      }
    }
    return `<div class="tt-entry">
      <span class="tt-symbol">${escapeHtml(entry.symbol)}</span>
      <small class="tt-pronounce">${escapeHtml(entry.pronounce || '')}</small>
      <div class="tt-name">${escapeHtml(entry.name)}</div>
      <div class="tt-desc">${escapeHtml(entry.desc)}</div>
      ${jumpHtml}
    </div>`;
  }).join('');

  for (const a of tip.querySelectorAll('.tt-jump')) {
    a.addEventListener('click', () => {
      state.navHistory.push({ ...state.current });
      updateBackBtn();
      navigate(a.dataset.file, a.dataset.slug, true);
      hideMathTooltip();
    });
  }

  // Position below anchor; flip up or left when near viewport edge
  tip.style.visibility = 'hidden';
  tip.classList.add('tt-visible');
  const rect = anchor.getBoundingClientRect();
  const tipW = tip.offsetWidth  || 280;
  const tipH = tip.offsetHeight || 160;
  let left = rect.left;
  let top  = rect.bottom + 6;
  if (left + tipW > window.innerWidth  - 8) left = window.innerWidth  - tipW - 8;
  if (top  + tipH > window.innerHeight - 8) top  = rect.top - tipH - 6;
  if (left < 8) left = 8;
  if (top  < 8) top  = 8;
  tip.style.left = left + 'px';
  tip.style.top  = top  + 'px';
  tip.style.visibility = '';
}

function attachMathTooltips(root) {
  const tip = document.getElementById('math-tooltip');
  if (!tip) return;
  tip.addEventListener('mouseenter', cancelHideTT);
  tip.addEventListener('mouseleave', scheduleHideTT);

  for (const el of root.querySelectorAll('.katex')) {
    const latex = el.querySelector('annotation[encoding="application/x-tex"]')?.textContent?.trim() || '';
    if (!latex) continue;
    const entries = lookupAllMath(latex);
    if (!entries.length) continue;
    el.dataset.tt = '1';
    el.addEventListener('mouseenter', (e) => showMathTooltip(entries, e.currentTarget));
    el.addEventListener('mouseleave', scheduleHideTT);
  }
}

function escapeRegExp(s) {
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function termKeysForEntry(entry) {
  return [entry.name, ...(entry.keys || [])]
    .map(stripMdInline)
    .filter(k => k.length >= 4 && /[A-Za-z]/.test(k) && !/[\\$^{}=]/.test(k));
}

function attachTerminologyTooltips(root) {
  if (!state.glossary || !state.glossary.length) return;
  const terms = [];
  const seen = new Set();
  for (const entry of state.glossary) {
    for (const key of termKeysForEntry(entry)) {
      const norm = key.toLowerCase();
      if (seen.has(norm)) continue;
      seen.add(norm);
      terms.push({ key, entry });
    }
  }
  terms.sort((a, b) => b.key.length - a.key.length);
  if (!terms.length) return;
  const pattern = new RegExp('\\b(' + terms.map(t => escapeRegExp(t.key)).join('|') + ')\\b', 'i');
  const byLower = new Map(terms.map(t => [t.key.toLowerCase(), t.entry]));
  let wrapped = 0;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (wrapped > 300) return NodeFilter.FILTER_REJECT;
      const text = node.nodeValue;
      if (!text || !pattern.test(text)) return NodeFilter.FILTER_REJECT;
      const parent = node.parentElement;
      if (!parent) return NodeFilter.FILTER_REJECT;
      if (parent.closest('a, button, input, textarea, select, code, pre, .katex, .term-tip, #math-tooltip, .exam')) {
        return NodeFilter.FILTER_REJECT;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  for (const node of nodes) {
    const text = node.nodeValue;
    const match = pattern.exec(text);
    if (!match) continue;
    const matched = match[0];
    const entry = byLower.get(matched.toLowerCase());
    if (!entry) continue;
    const before = text.slice(0, match.index);
    const after = text.slice(match.index + matched.length);
    const frag = document.createDocumentFragment();
    if (before) frag.appendChild(document.createTextNode(before));
    const span = document.createElement('span');
    span.className = 'term-tip';
    span.textContent = matched;
    span.addEventListener('mouseenter', e => showMathTooltip([entry], e.currentTarget));
    span.addEventListener('mouseleave', scheduleHideTT);
    frag.appendChild(span);
    if (after) frag.appendChild(document.createTextNode(after));
    node.parentNode.replaceChild(frag, node);
    wrapped++;
  }
}

function updateBackBtn() {
  const btn = document.getElementById('backBtn');
  if (!btn) return;
  btn.style.display = state.navHistory.length > 0 ? 'inline-flex' : 'none';
}
function goBack() {
  const prev = state.navHistory.pop();
  if (!prev) return;
  updateBackBtn();
  navigate(prev.fileId, prev.slug, true);
}

// ============ Chapter index extraction ============
function buildChapterIndex() {
  state.chapterIndex = [];
  for (const f of state.manifest.files) {
    const md = getRawMd(f.id);
    if (!md) continue;
    // Find ## headings → chapters within the file
    const lines = md.split('\n');
    let chapNum = 0;
    let foundPartTitle = false;
    let firstHeading = null;
    for (const line of lines) {
      const h2 = line.match(/^## (.+)$/);
      const h1 = line.match(/^# (.+)$/);
      if (h1 && !firstHeading) {
        firstHeading = h1[1];
      }
      if (h2) {
        chapNum++;
        const title = h2[1].trim();
        state.chapterIndex.push({
          fileId: f.id,
          slug: slugify(title),
          title,
          partTitle: f.part,
          partFullTitle: f.title,
          chapNum,
        });
      }
    }
    // If file has no ## (only #), make a single entry referencing the file's main title
    if (chapNum === 0) {
      state.chapterIndex.push({
        fileId: f.id,
        slug: '',
        title: firstHeading || f.title,
        partTitle: f.part,
        partFullTitle: f.title,
        chapNum: 0,
      });
    }
  }
}

// ============ Sidebar ============
function buildSidebar() {
  const toc = $('#toc');
  toc.innerHTML = '';
  // Progress link at top
  const progLink = document.createElement('a');

  progLink.href = '#progress';

  progLink.addEventListener('click', (e) => {
    e.preventDefault();
    showProgress(true);
    if (window.innerWidth < 900) document.body.classList.remove('sidebar-open');
  });
  toc.appendChild(progLink);
  const grouped = {};
  for (const ch of state.chapterIndex) {
    if (!grouped[ch.fileId]) grouped[ch.fileId] = { file: state.manifest.files.find(f=>f.id===ch.fileId), chapters: [] };
    grouped[ch.fileId].chapters.push(ch);
  }
  for (const fileId of Object.keys(grouped)) {
    const g = grouped[fileId];
    const part = document.createElement('div');
    part.className = 'part';
    part.dataset.fileId = fileId;

    title.className = 'part-title';

    title.addEventListener('click', () => part.classList.toggle('collapsed'));
    part.appendChild(title);
    const list = document.createElement('div');
    list.className = 'part-list';
    for (const ch of g.chapters) {
      const a = document.createElement('a');
      a.className = 'chap';
      a.href = '#' + (ch.slug || ch.fileId);
      a.dataset.fileId = ch.fileId;
      a.dataset.slug = ch.slug;
      const num = ch.chapNum > 0 ? `<span class="num">${ch.chapNum}.</span>` : '';
      a.innerHTML = `${num}${escapeHtml(ch.title.replace(/^Chapter\s+\w+\s*[—-]\s*/i, ''))}`;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        navigate(ch.fileId, ch.slug);
        if (window.innerWidth < 900) document.body.classList.remove('sidebar-open');

}

function highlightSidebar(fileId, slug) {
  $$('#sidebar a.chap').forEach(a => {
    a.classList.toggle('active',
      a.dataset.fileId === fileId &&
      (slug ? a.dataset.slug === slug : a.dataset.slug === '' || a.dataset.slug === a.dataset.slug));
  });
  // Better: exact match on slug
  const exact = $$('#sidebar a.chap').filter(a => a.dataset.fileId === fileId && a.dataset.slug === slug);
  if (exact.length) {
    $$('#sidebar a.chap').forEach(a => a.classList.remove('active'));
    exact[0].classList.add('active');
    exact[0].scrollIntoView({ block: 'nearest' });
  }
}

// ============ Navigation ============
function renderFile(fileId) {
  if (state.rendered[fileId]) return state.rendered[fileId];
  const md = getRawMd(fileId);
  if (!md) return null;
  const html = renderMarkdown(md);
  state.rendered[fileId] = { html };
  return state.rendered[fileId];
}

function navigate(fileId, slug, push = true) {
  const r = renderFile(fileId);
  if (!r) return;
  const content = $('#content');
  content.innerHTML = r.html;

  // KaTeX
  renderMath(content);

  // Cross-reference enhancement: rewrite chapter-mention links
  enhanceCrossReferences(content, fileId);

  // Mount interactive diagrams
  mountDiagrams(content, fileId);

  // Mount per-chapter exams
  if (typeof window.SeExams === 'object') window.SeExams.mountAll(content);

  // Add prev/next nav
  addPrevNextNav(content, fileId, slug);

  // Scroll to slug
  if (slug) {
    const target = content.querySelector('#' + CSS.escape(slug));
    if (target) {
      setTimeout(() => target.scrollIntoView({ block: 'start', behavior: 'instant' }), 0);
    } else {
      $('#main').scrollTop = 0;
    }
  } else {
    $('#main').scrollTop = 0;
  }

  state.current = { fileId, slug };
  highlightSidebar(fileId, slug);
  updateCrumbs(fileId, slug);

  if (push) {
    const hash = '#' + (slug || fileId);
    if (location.hash !== hash) history.pushState({ fileId, slug }, '', hash);
  }
}

function updateCrumbs(fileId, slug) {
  const file = state.manifest.files.find(f => f.id === fileId);
  if (!file) return;
  let txt = file.title;
  if (slug) {
    const ch = state.chapterIndex.find(c => c.fileId === fileId && c.slug === slug);
    if (ch) txt += '  ›  ' + ch.title;
  }
  $('#crumbs').textContent = txt;
}

function addPrevNextNav(content, fileId, slug) {
  const flat = state.chapterIndex;
  const idx = flat.findIndex(c => c.fileId === fileId && (slug ? c.slug === slug : c.chapNum === 0));
  if (idx < 0) return;
  const prev = flat[idx - 1];
  const next = flat[idx + 1];
  const nav = document.createElement('div');
  nav.className = 'chap-nav';
  nav.innerHTML = `
    <a class="prev ${prev ? '' : 'disabled'}" ${prev ? `data-file="${prev.fileId}" data-slug="${prev.slug}"` : ''}>
      <span class="label">← Previous</span>
      <span>${prev ? escapeHtml(prev.title) : ''}</span>
    </a>
    <a class="next ${next ? '' : 'disabled'}" ${next ? `data-file="${next.fileId}" data-slug="${next.slug}"` : ''}>
      <span class="label">Next →</span>
      <span>${next ? escapeHtml(next.title) : ''}</span>
    </a>`;
  content.appendChild(nav);
  nav.querySelectorAll('a').forEach(a => {
    if (a.classList.contains('disabled')) return;
    a.style.cursor = 'pointer';
    a.addEventListener('click', () => navigate(a.dataset.file, a.dataset.slug));
  });
}

// ============ Cross-reference enhancement ============
// Convert plain mentions of "Chapter N" into clickable xref links to the matching chapter.
function enhanceCrossReferences(root, currentFileId) {
  // Build a map of chapter-number → {fileId, slug, title}
  const map = {};
  for (const c of state.chapterIndex) {
    const m = c.title.match(/^Chapter\s+([A-Z]?\d+)\b/i);
    if (m) map[m[1].toUpperCase()] = c;
  }
  // Walk text nodes
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode: (n) => {
      if (n.parentElement && /^(A|CODE|PRE|H1|H2|H3|SCRIPT|STYLE)$/i.test(n.parentElement.tagName))
        return NodeFilter.FILTER_REJECT;
      if (!/Chapter\s+[A-Z]?\d+/i.test(n.nodeValue))
        return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  for (const tn of nodes) {
    const frag = document.createDocumentFragment();
    let last = 0;
    const re = /Chapter\s+([A-Z]?\d+)/gi;
    let m;
    let added = false;
    while ((m = re.exec(tn.nodeValue)) !== null) {
      const key = m[1].toUpperCase();
      const target = map[key];
      if (!target) continue;
      // Don't link to current chapter
      const curCh = state.chapterIndex.find(c => c.fileId === state.current?.fileId && c.slug === state.current?.slug);
      if (curCh && curCh.slug === target.slug) continue;
      if (m.index > last) frag.appendChild(document.createTextNode(tn.nodeValue.slice(last, m.index)));
      const a = document.createElement('a');
      a.className = 'xref';
      a.href = '#' + target.slug;
      a.textContent = m[0];
      a.title = target.title;
      a.addEventListener('click', (ev) => {
        ev.preventDefault();
        navigate(target.fileId, target.slug);
      });
      frag.appendChild(a);
      last = m.index + m[0].length;
      added = true;
    }
    if (added) {
      if (last < tn.nodeValue.length) frag.appendChild(document.createTextNode(tn.nodeValue.slice(last)));
      tn.parentNode.replaceChild(frag, tn);
    }
  }
}

// ============ Search ============
function buildSearchIndex() {
  state.searchIndex = [];
  for (const c of state.chapterIndex) {
    const md = getRawMd(c.fileId);
    if (!md) continue;
    // Take section text — for files with ##, slice between this and next ##
    let text = md;
    if (c.slug) {
      const lines = md.split('\n');
      const startIdx = lines.findIndex(l => l.match(/^## /) && slugify(l.replace(/^##\s+/, '')) === c.slug);
      if (startIdx >= 0) {
        let endIdx = lines.length;
        for (let i = startIdx + 1; i < lines.length; i++) {
          if (/^## /.test(lines[i])) { endIdx = i; break; }
        }
        text = lines.slice(startIdx, endIdx).join('\n');
      }
    }
    // Strip markdown noise
    const plain = text.replace(/```[\s\S]*?```/g, '')
                      .replace(/\$\$[\s\S]*?\$\$/g, '')
                      .replace(/\$[^$]*\$/g, '')
                      .replace(/[#*_`>|\-]/g, ' ')
                      .replace(/\s+/g, ' ');
    state.searchIndex.push({
      fileId: c.fileId, slug: c.slug, title: c.title,
      partTitle: c.partTitle, text: plain,
    });
  }
}

function doSearch(q) {
  const results = $('#searchResults');
  if (!q || q.length < 2) { results.style.display = 'none'; return; }
  const tokens = q.toLowerCase().split(/\s+/).filter(t => t);
  const matches = [];
  for (const item of state.searchIndex) {
    const lower = item.text.toLowerCase();
    let score = 0;
    let firstHit = -1;
    for (const t of tokens) {
      const i = lower.indexOf(t);
      if (i < 0) { score = 0; break; }
      score += 1;
      if (firstHit < 0) firstHit = i;
    }
    if (item.title.toLowerCase().includes(q.toLowerCase())) score += 5;
    if (score > 0) matches.push({ item, score, firstHit });
  }
  matches.sort((a,b) => b.score - a.score);
  const top = matches.slice(0, 20);
  if (!top.length) {
    results.innerHTML = '<div class="res"><div class="title">No results</div></div>';
    results.style.display = 'block';
    return;
  }
  results.innerHTML = top.map(m => {
    const start = Math.max(0, (m.firstHit || 0) - 30);
    let snippet = m.item.text.slice(start, start + 160);
    for (const t of tokens) {
      snippet = snippet.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
        match => `<mark>${match}</mark>`);
    }
    return `<div class="res" data-file="${m.item.fileId}" data-slug="${m.item.slug}">
      <div class="title">${escapeHtml(m.item.title)}</div>
      <div class="snippet">${m.item.partTitle} — …${snippet}…</div>
    </div>`;
  }).join('');
  results.querySelectorAll('.res[data-file]').forEach(div => {
    div.addEventListener('click', () => {
      navigate(div.dataset.file, div.dataset.slug);
      $('#search').value = '';
      results.style.display = 'none';
    });
  });
  results.style.display = 'block';
}

// ============ Theme & Print ============
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('book.theme', t); } catch (e) {}
}
function loadTheme() {
  let t = 'light';
  try { t = localStorage.getItem('book.theme') || 'light'; } catch (e) {}
  setTheme(t);
}

// ============ History / Hash ============
function fromHash() {
  const h = location.hash.replace(/^#/, '');
  if (h === 'progress') return showProgress(false);
  if (!h) return navigate(state.manifest.files[0].id, '', false);
  // Try to find a matching chapter slug
  const c = state.chapterIndex.find(x => x.slug === h);
  if (c) return navigate(c.fileId, c.slug, false);
  // Or a file id
  const f = state.manifest.files.find(x => x.id === h);
  if (f) return navigate(f.id, '', false);
  navigate(state.manifest.files[0].id, '', false);
}

function showProgress(push = true) {
  if (typeof window.SeExams !== 'object') return;
  const content = $('#content');
  content.innerHTML = '';
  window.SeExams.renderProgress(content);
  $('#crumbs').textContent = 'Progress Dashboard';
  state.current = { fileId: 'progress', slug: '' };
  $$('#sidebar a.chap').forEach(a => a.classList.remove('active'));
  const link = $('#sidebar a.progress-link');
  if (link) link.classList.add('active');
  if (push && location.hash !== '#progress') history.pushState({ progress: true }, '', '#progress');
  $('#main').scrollTop = 0;
}

// ============ Diagrams (registered separately, see diagrams script) ============
function mountDiagrams(root, fileId) {
  if (typeof window.SeDiagrams !== 'object') return;
  // Inject diagrams keyed to chapter slugs
  const headings = root.querySelectorAll('h2[id]');
  for (const h of headings) {
    const slug = h.id;
    const list = window.SeDiagrams.byChapter[slug];
    if (!list) continue;
    // find next h2 to know where to insert; otherwise append to end of section
    let insertBefore = h.nextElementSibling;
    while (insertBefore && insertBefore.tagName !== 'H2') {
      insertBefore = insertBefore.nextElementSibling;
    }
    for (const def of list) {
      const container = document.createElement('div');
      container.className = 'diagram';
      try {
        def.build(container);
      } catch (e) {
        console.error('diagram error', def, e);
        container.textContent = '[diagram error]';
      }
      if (insertBefore) {
        h.parentNode.insertBefore(container, insertBefore);
      } else {
        h.parentNode.appendChild(container);
      }
    }
  }
}

// ============ Initialization ============
function init() {
  buildChapterIndex();
  buildGlossary();
  buildSidebar();
  buildSearchIndex();
  loadTheme();

  // Wait for marked + KaTeX to load
  let markedInited = false;
  function ready() {
    if (typeof marked === 'undefined' || typeof renderMathInElement === 'undefined') {
      return setTimeout(ready, 50);
    }
    if (!markedInited) { initMarked(); markedInited = true; }
    fromHash();
  }
  ready();

  // Top bar
  $('#themeBtn').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  });
  $('#printBtn').addEventListener('click', () => {
    // Render *all* chapters into one container, then print
    const content = $('#content');
    const allHtml = state.manifest.files.map(f => renderFile(f.id)?.html || '').join('\n<div class="page-break"></div>\n');
    content.innerHTML = allHtml;
    renderMath(content);
    enhanceCrossReferences(content, null);
    mountDiagrams(content, null);
    setTimeout(() => {
      window.print();
      // restore current view after print
      setTimeout(() => state.current && navigate(state.current.fileId, state.current.slug, false), 200);
    }, 400);
  });
  document.getElementById('backBtn').addEventListener('click', goBack);
  $('#menuToggle').addEventListener('click', () => document.body.classList.toggle('sidebar-open'));
  $('#search').addEventListener('input', e => doSearch(e.target.value));
  $('#search').addEventListener('focus', () => $('#searchResults').style.display = $('#search').value.length >= 2 ? 'block' : 'none');
  document.addEventListener('click', e => {
    if (!e.target.closest('#search') && !e.target.closest('#searchResults'))
      $('#searchResults').style.display = 'none';
  });
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault(); $('#search').focus();
    }
  });
  window.addEventListener('popstate', () => fromHash());
  window.addEventListener('hashchange', () => fromHash());
}

document.addEventListener('DOMContentLoaded', init);

<!-- ===== Interactive SVG Diagrams ===== -->
<script>
"use strict";
window.SeDiagrams = { byChapter: {} };

const SVG_NS = 'http://www.w3.org/2000/svg';
function svg(tag, attrs, children) {
  const el = document.createElementNS(SVG_NS, tag);
  if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
  if (children) for (const c of children) el.appendChild(c);
  return el;
}
function sliderRow(label, min, max, step, init, fmt, onChange) {
  const wrap = document.createElement('label');
  const lbl = document.createElement('span');
  lbl.textContent = `${label}: ${fmt ? fmt(init) : init}`;
  const range = document.createElement('input');
  range.type = 'range'; range.min = min; range.max = max; range.step = step; range.value = init;
  range.addEventListener('input', () => {
    const v = parseFloat(range.value);
    lbl.textContent = `${label}: ${fmt ? fmt(v) : v}`;
    onChange(v);
  });
  wrap.appendChild(lbl);
  wrap.appendChild(range);
  return wrap;
}
function diagTitle(title, badge) {
  const t = document.createElement('div');
  t.className = 'd-title';
  t.innerHTML = `<span>${title}</span><span class="badge">${badge || 'Interactive'}</span>`;
  return t;
}
function diagDesc(text) {
  const d = document.createElement('div');
  d.className = 'd-desc';
  d.textContent = text;
  return d;
}
function readout() {
  const r = document.createElement('div');
  r.className = 'readout';
  return r;
}
function controls() {
  const c = document.createElement('div');
  c.className = 'controls';
  return c;
}

// ====== 1. Number Line (Ch A1) ======
function buildNumberLine(container) {
  container.appendChild(diagTitle('Interactive Number Line', 'Try it'));
  container.appendChild(diagDesc('Drag the red marker. Read its value, sign, and absolute value.'));
  const W = 700, H = 120, pad = 30;
  const s = svg('svg', { viewBox: `0 0 ${W} ${H}` });
  // axis
  s.appendChild(svg('line', { x1: pad, y1: H/2, x2: W - pad, y2: H/2, stroke: '#888', 'stroke-width': 2 }));
  // ticks
  const minV = -10, maxV = 10;
  const xOf = v => pad + (v - minV) / (maxV - minV) * (W - 2*pad);
  for (let v = minV; v <= maxV; v++) {
    const x = xOf(v);
    s.appendChild(svg('line', { x1: x, y1: H/2 - 6, x2: x, y2: H/2 + 6, stroke: '#888' }));
    const txt = svg('text', { x: x, y: H/2 + 22, 'text-anchor': 'middle', 'font-size': 11, fill: '#666' });
    txt.textContent = v;
    s.appendChild(txt);
  }
  // marker
  let val = 0;
  const marker = svg('circle', { cx: xOf(val), cy: H/2, r: 9, fill: '#ef4444', stroke: '#991b1b', 'stroke-width': 2, cursor: 'grab' });
  s.appendChild(marker);
  const lbl = svg('text', { x: xOf(val), y: H/2 - 16, 'text-anchor': 'middle', 'font-size': 13, fill: '#111', 'font-weight': 'bold' });
  lbl.textContent = val;
  s.appendChild(lbl);
  container.appendChild(s);
  const r = readout();
  function update() {
    marker.setAttribute('cx', xOf(val));
    lbl.setAttribute('x', xOf(val));
    lbl.textContent = val.toFixed(1);
    r.textContent = `value = ${val.toFixed(2)}    sign = ${val > 0 ? '+' : (val < 0 ? '−' : '0')}    |x| = ${Math.abs(val).toFixed(2)}`;
  }
  let dragging = false;
  s.addEventListener('mousedown', e => { dragging = true; });
  window.addEventListener('mouseup', () => dragging = false);
  s.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = s.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * W;
    val = Math.max(minV, Math.min(maxV, minV + (x - pad) / (W - 2*pad) * (maxV - minV)));
    val = Math.round(val * 10) / 10;
    update();
  });
  container.appendChild(r);
  update();
}

// ====== 2. Force Vector Decomposition (Ch 21) ======
function buildVectorDecomp(container) {
  container.appendChild(diagTitle('Force Vector Decomposition', 'Try it'));
  container.appendChild(diagDesc('Adjust magnitude and angle. Watch components update.'));
  const W = 500, H = 320;
  const s = svg('svg', { viewBox: `0 0 ${W} ${H}` });
  const ox = 80, oy = 240;
  // axes
  s.appendChild(svg('line', { x1: ox, y1: oy, x2: ox + 380, y2: oy, stroke: '#888', 'stroke-width': 1.5 }));
  s.appendChild(svg('line', { x1: ox, y1: oy, x2: ox, y2: 30, stroke: '#888', 'stroke-width': 1.5 }));
  const xt = svg('text', { x: ox + 380, y: oy + 16, 'font-size': 12, fill: '#666' }); xt.textContent = 'x'; s.appendChild(xt);
  const yt = svg('text', { x: ox - 14, y: 30, 'font-size': 12, fill: '#666' }); yt.textContent = 'y'; s.appendChild(yt);
  // arrows: vector + components
  const force = svg('line', { stroke: '#dc2626', 'stroke-width': 3, 'marker-end': 'url(#arrh)' });
  const fx = svg('line', { stroke: '#2563eb', 'stroke-width': 2, 'stroke-dasharray': '5,3' });
  const fy = svg('line', { stroke: '#16a34a', 'stroke-width': 2, 'stroke-dasharray': '5,3' });
  // arrowhead def
  const defs = svg('defs');
  const marker = svg('marker', { id: 'arrh', viewBox: '0 0 10 10', refX: 8, refY: 5, markerWidth: 8, markerHeight: 8, orient: 'auto' });
  marker.appendChild(svg('path', { d: 'M0,0 L10,5 L0,10 Z', fill: '#dc2626' }));
  defs.appendChild(marker);
  s.appendChild(defs);
  s.appendChild(fx); s.appendChild(fy); s.appendChild(force);
  // arc + angle label
  const arc = svg('path', { fill: 'none', stroke: '#9333ea', 'stroke-width': 1.5 });
  s.appendChild(arc);

    angLbl.setAttribute('x', ox + arcR + 4);
    angLbl.setAttribute('y', oy - arcR/2);
    angLbl.textContent = `θ = ${ang}°`;
    const fxv = mag * Math.cos(rad);
    const fyv = mag * Math.sin(rad);
    r.textContent = `F = ${mag} kN  at θ = ${ang}°\nFx = F·cos θ = ${fxv.toFixed(2)} kN\nFy = F·sin θ = ${fyv.toFixed(2)} kN\n|F|² = Fx² + Fy² = ${(fxv**2 + fyv**2).toFixed(1)}`;

// ====== 3. Simply Supported Beam under UDL (Ch 13/26) ======
function buildBeamUDL(container) {
  container.appendChild(diagTitle('Simply Supported Beam — UDL', 'Try it'));
  container.appendChild(diagDesc('Adjust load and span. Beam, SFD, BMD, and deflection update live.'));
  const W = 700, H = 360;
  const s = svg('svg', { viewBox: `0 0 ${W} ${H}` });
  // beam
  const x0 = 60, x1 = 640;
  const yBeam = 60;
  const beam = svg('rect', { x: x0, y: yBeam, width: x1 - x0, height: 14, fill: '#94a3b8', stroke: '#475569' });
  // supports
  function support(cx, cy) {
    const g = svg('g');
    g.appendChild(svg('polygon', { points: `${cx},${cy} ${cx-10},${cy+15} ${cx+10},${cy+15}`, fill: '#475569' }));
    g.appendChild(svg('line', { x1: cx-15, y1: cy+18, x2: cx+15, y2: cy+18, stroke: '#475569', 'stroke-width': 2 }));
    return g;
  }
  // SFD area
  const sfdY = 150, sfdH = 60;
  const sfdAxis = svg('line', { x1: x0, y1: sfdY + sfdH/2, x2: x1, y2: sfdY + sfdH/2, stroke: '#888', 'stroke-width': 1 });
  // BMD area
  const bmdY = 260, bmdH = 70;
  const bmdAxis = svg('line', { x1: x0, y1: bmdY + bmdH, x2: x1, y2: bmdY + bmdH, stroke: '#888', 'stroke-width': 1 });

  // UDL arrows
  const arrowsG = svg('g');

  // SFD path
  const sfdPath = svg('polygon', { fill: 'rgba(37,99,235,0.3)', stroke: '#2563eb', 'stroke-width': 2 });
  // BMD path
  const bmdPath = svg('path', { fill: 'rgba(220,38,38,0.25)', stroke: '#dc2626', 'stroke-width': 2 });
  // labels
  const sfdLbl = svg('text', { x: x0, y: sfdY - 4, 'font-size': 12, fill: '#2563eb', 'font-weight': 'bold' }); sfdLbl.textContent = 'Shear Force Diagram'; s.appendChild(sfdLbl);
  const bmdLbl = svg('text', { x: x0, y: bmdY - 4, 'font-size': 12, fill: '#dc2626', 'font-weight': 'bold' }); bmdLbl.textContent = 'Bending Moment Diagram'; s.appendChild(bmdLbl);

  s.appendChild(beam);
  s.appendChild(support(x0, yBeam + 14));
  s.appendChild(support(x1, yBeam + 14));
  s.appendChild(arrowsG);
  s.appendChild(sfdAxis);
  s.appendChild(sfdPath);
  s.appendChild(bmdAxis);
  s.appendChild(bmdPath);

  // Reaction labels
  const rA = svg('text', { x: x0 - 8, y: yBeam + 60, 'font-size': 11, fill: '#16a34a', 'text-anchor': 'end', 'font-weight': 'bold' }); s.appendChild(rA);
  const rB = svg('text', { x: x1 + 8, y: yBeam + 60, 'font-size': 11, fill: '#16a34a', 'text-anchor': 'start', 'font-weight': 'bold' }); s.appendChild(rB);
  const mMaxLbl = svg('text', { 'font-size': 12, fill: '#dc2626', 'text-anchor': 'middle', 'font-weight': 'bold' }); s.appendChild(mMaxLbl);

  container.appendChild(s);

  let w = 10, L = 6;
  const r = readout();
  const ctrls = controls();
  function update() {
    arrowsG.innerHTML = '';
    const N = 14;
    const span = x1 - x0;
    for (let i = 0; i <= N; i++) {
      const x = x0 + (i / N) * span;
      arrowsG.appendChild(svg('line', { x1: x, y1: yBeam - 28, x2: x, y2: yBeam, stroke: '#0ea5e9', 'stroke-width': 1.5, 'marker-end': 'url(#udlarr)' }));
    }
    // ensure arrow marker exists
    if (!s.querySelector('#udlarr')) {
      const defs = svg('defs');
      const m = svg('marker', { id: 'udlarr', viewBox: '0 0 10 10', refX: 8, refY: 5, markerWidth: 7, markerHeight: 7, orient: 'auto' });
      m.appendChild(svg('path', { d: 'M0,0 L10,5 L0,10 Z', fill: '#0ea5e9' }));
      defs.appendChild(m);
      s.appendChild(defs);
    }
    const Vmax = w * L / 2;
    const Mmax = w * L * L / 8;
    rA.textContent = `R_A=${Vmax.toFixed(1)}`;
    rB.textContent = `R_B=${Vmax.toFixed(1)}`;
    // SFD: linear from +Vmax to -Vmax
    const sfdScale = 30 / Math.max(1, Vmax);
    const yMid = sfdY + sfdH / 2;
    const yTop = yMid - Vmax * sfdScale;
    const yBot = yMid + Vmax * sfdScale;
    sfdPath.setAttribute('points', `${x0},${yMid} ${x0},${yTop} ${x1},${yBot} ${x1},${yMid}`);
    // BMD: parabola, M(x) = wLx/2 - wx²/2
    const xs = 30;
    let pts = `M ${x0} ${bmdY + bmdH} `;
    for (let i = 0; i <= xs; i++) {
      const t = i / xs;
      const xCoord = t * L;
      const M = w * L * xCoord / 2 - w * xCoord * xCoord / 2;
      const px = x0 + t * (x1 - x0);
      const py = bmdY + bmdH - (M / Mmax) * bmdH * 0.9;
      pts += `L ${px} ${py} `;
    }
    pts += `L ${x1} ${bmdY + bmdH} Z`;
    bmdPath.setAttribute('d', pts);
    // M_max label at midspan
    const midX = (x0 + x1) / 2;
    const midY = bmdY + bmdH - bmdH * 0.9 - 6;
    mMaxLbl.setAttribute('x', midX);
    mMaxLbl.setAttribute('y', midY);
    mMaxLbl.textContent = `M_max = wL²/8 = ${Mmax.toFixed(2)} kN·m`;

    r.textContent = `w = ${w} kN/m, L = ${L} m\nReactions: R_A = R_B = wL/2 = ${Vmax.toFixed(2)} kN\nMax shear |V_max| = ${Vmax.toFixed(2)} kN  (at supports)\nMax moment M_max = wL²/8 = ${Mmax.toFixed(2)} kN·m  (at midspan)`;
  }
  ctrls.appendChild(sliderRow('Load w (kN/m)', 1, 30, 0.5, w, v => v, v => { w = v; update(); }));
  ctrls.appendChild(sliderRow('Span L (m)', 2, 12, 0.5, L, v => v, v => { L = v; update(); }));
  container.appendChild(ctrls);
  container.appendChild(r);
  update();
}

// ====== 4. Stress under axial + bending (Ch 17) ======
function buildBendingStress(container) {
  container.appendChild(diagTitle('Bending Stress Distribution', 'Try it'));
  container.appendChild(diagDesc('Vary moment and section dimensions. Stress = My/I varies linearly across the depth.'));
  const W = 600, H = 280;
  const s = svg('svg', { viewBox: `0 0 ${W} ${H}` });
  // section drawing on left
  const cx = 130, cy = H/2;
  const sectionRect = svg('rect', { fill: '#cbd5e1', stroke: '#334155', 'stroke-width': 1.5 });
  s.appendChild(sectionRect);
  // neutral axis
  const naLine = svg('line', { stroke: '#dc2626', 'stroke-width': 1.5, 'stroke-dasharray': '5,3' });
  s.appendChild(naLine);
  // stress diagram on right
  const ox = 360;
  const stressAxis = svg('line', { x1: ox, y1: 40, x2: ox, y2: H - 40, stroke: '#888' });
  s.appendChild(stressAxis);
  const stressTri = svg('path', { fill: 'rgba(37,99,235,0.3)', stroke: '#2563eb', 'stroke-width': 2 });
  s.appendChild(stressTri);
  // labels
  const lblTop = svg('text', { 'font-size': 11, fill: '#2563eb', 'text-anchor': 'start' }); s.appendChild(lblTop);
  const lblBot = svg('text', { 'font-size': 11, fill: '#2563eb', 'text-anchor': 'start' }); s.appendChild(lblBot);

  container.appendChild(s);
  let M = 50, b = 300, h = 600; // kN·m, mm
  const r = readout();
  const ctrls = controls();
  function update() {
    // section
    const visB = Math.min(120, b * 0.3);
    const visH = Math.min(180, h * 0.3);
    sectionRect.setAttribute('x', cx - visB/2);
    sectionRect.setAttribute('y', cy - visH/2);
    sectionRect.setAttribute('width', visB);
    sectionRect.setAttribute('height', visH);
    naLine.setAttribute('x1', cx - visB/2 - 10);
    naLine.setAttribute('x2', cx + visB/2 + 10);
    naLine.setAttribute('y1', cy);
    naLine.setAttribute('y2', cy);

    // I, sigma_max
    const I = b * Math.pow(h, 3) / 12; // mm^4
    const sigma_max_MPa = (M * 1e6) * (h/2) / I; // M kN·m → N·mm
    const triH = visH;
    const triW = 60;
    const yTop = cy - triH/2, yBot = cy + triH/2;
    stressTri.setAttribute('d', `M ${ox} ${yTop} L ${ox + triW} ${yTop} L ${ox - triW} ${yBot} L ${ox} ${yBot} Z`);
    lblTop.setAttribute('x', ox + triW + 6); lblTop.setAttribute('y', yTop + 4);
    lblTop.textContent = `+σ = ${sigma_max_MPa.toFixed(2)} MPa (compression)`;
    lblBot.setAttribute('x', ox - triW - 6); lblBot.setAttribute('y', yBot - 4);
    lblBot.setAttribute('text-anchor', 'end');
    lblBot.textContent = `−σ = ${(-sigma_max_MPa).toFixed(2)} MPa (tension)`;
    r.textContent = `Section: b=${b} mm, h=${h} mm\nI = b·h³/12 = ${(I/1e6).toFixed(2)} × 10⁶ mm⁴\nM = ${M} kN·m\nσ_max = M·(h/2)/I = ${sigma_max_MPa.toFixed(3)} MPa`;
  }
  ctrls.appendChild(sliderRow('Moment M (kN·m)', 5, 500, 5, M, v => v, v => { M = v; update(); }));
  ctrls.appendChild(sliderRow('Width b (mm)', 100, 800, 10, b, v => v, v => { b = v; update(); }));
  ctrls.appendChild(sliderRow('Depth h (mm)', 100, 1200, 10, h, v => v, v => { h = v; update(); }));
  container.appendChild(ctrls);
  container.appendChild(r);
  update();
}

// ====== 5. Mode Shape Animation (Ch 39) ======
function buildModeShape(container) {
  container.appendChild(diagTitle('Building Mode Shapes — Animation', 'Try it'));
  container.appendChild(diagDesc('5-story building. Choose a mode (1–3); watch it sway.'));
  const W = 500, H = 360;
  const s = svg('svg', { viewBox: `0 0 ${W} ${H}` });
  // ground
  s.appendChild(svg('line', { x1: 50, y1: 320, x2: 450, y2: 320, stroke: '#666', 'stroke-width': 2 }));
  // hatched ground
  for (let i = 0; i < 12; i++) {
    s.appendChild(svg('line', { x1: 50 + i*30, y1: 320, x2: 30 + i*30, y2: 340, stroke: '#666' }));
  }
  // building geometry (5 stories)
  const N = 5, h0 = 50, w0 = 100;
  const baseX = 250 - w0/2;
  const stories = [];
  for (let i = 0; i < N; i++) {
    const y = 320 - (i+1)*h0;
    const path = svg('path', { fill: 'rgba(96,165,250,0.5)', stroke: '#1e40af', 'stroke-width': 1.5 });
    s.appendChild(path);
    stories.push({ baseY: y, path, idx: i+1 });
  }
  container.appendChild(s);

  let mode = 1, t = 0, running = true;
  const r = readout();
  const ctrls = controls();
  // mode shape function: phi_n(j) = sin( (2n-1) * pi/2 * j/N )
  function shape(j) {
    return Math.sin((2 * mode - 1) * Math.PI / 2 * (j / N));
  }
  function frame() {
    if (!running) return;
    t += 0.03;
    const A = 30; // pixel amplitude
    const sineT = Math.sin(t * (1 + (mode - 1) * 0.3));
    // displaced vertices
    const vertsLeft = [], vertsRight = [];
    for (let i = 0; i <= N; i++) {
      const y = 320 - i * h0;
      const phi = shape(i);
      const dx = A * phi * sineT;
      vertsLeft.push([baseX + dx, y]);
      vertsRight.push([baseX + w0 + dx, y]);
    }
    // each story: quadrilateral connecting two consecutive levels
    for (let i = 0; i < N; i++) {
      const [x1, y1] = vertsLeft[i];
      const [x2, y2] = vertsRight[i];
      const [x3, y3] = vertsRight[i+1];
      const [x4, y4] = vertsLeft[i+1];
      stories[i].path.setAttribute('d', `M ${x1} ${y1} L ${x2} ${y2} L ${x3} ${y3} L ${x4} ${y4} Z`);
    }
    requestAnimationFrame(frame);
  }
  function info() {
    const Tperiod = (1 / (1 + (mode - 1) * 0.3)).toFixed(2);
    r.textContent = `Mode ${mode}\nNormalized period: T${mode}/T1 ≈ ${Tperiod}\nShape sample: φ(top) = ${shape(N).toFixed(3)}\nReal periods come from ETABS modal analysis.`;
  }
  const modeSelect = document.createElement('label');
  const ms = document.createElement('span'); ms.textContent = 'Mode'; modeSelect.appendChild(ms);
  const sel = document.createElement('input');
  sel.type = 'range'; sel.min = 1; sel.max = 3; sel.step = 1; sel.value = 1;
  sel.addEventListener('input', () => { mode = parseInt(sel.value); ms.textContent = `Mode: ${mode}`; info(); });
  modeSelect.appendChild(sel);
  ctrls.appendChild(modeSelect);
  const pauseBtn = document.createElement('button');
  pauseBtn.textContent = 'Pause';
  pauseBtn.style.cssText = 'padding:6px 12px;border:1px solid #ccc;border-radius:4px;cursor:pointer;background:#fff;';
  pauseBtn.addEventListener('click', () => {
    running = !running;
    pauseBtn.textContent = running ? 'Pause' : 'Play';
    if (running) frame();
  });
  ctrls.appendChild(pauseBtn);
  container.appendChild(ctrls);
  container.appendChild(r);
  info();
  frame();
}

// ====== 6. Mesh Convergence (Ch 33) ======
function buildMeshConvergence(container) {
  container.appendChild(diagTitle('Mesh Convergence — Limit in Action', 'Try it'));
  container.appendChild(diagDesc('Refine the mesh; the computed deflection approaches the true value.'));
  const W = 600, H = 260;
  const s = svg('svg', { viewBox: `0 0 ${W} ${H}` });
  // axis
  s.appendChild(svg('line', { x1: 60, y1: 220, x2: 580, y2: 220, stroke: '#444', 'stroke-width': 1.5 }));
  s.appendChild(svg('line', { x1: 60, y1: 30, x2: 60, y2: 220, stroke: '#444', 'stroke-width': 1.5 }));
  // axis labels
  const xl = svg('text', { x: 320, y: 250, 'text-anchor': 'middle', 'font-size': 12, fill: '#555' });
  xl.textContent = 'Mesh size (m, finer →)'; s.appendChild(xl);
  const yl = svg('text', { x: 14, y: 130, 'font-size': 12, fill: '#555', transform: 'rotate(-90 14 130)' });
  yl.textContent = 'Max deflection (mm)'; s.appendChild(yl);
  // true value asymptote
  const trueLine = svg('line', { x1: 60, y1: 0, x2: 580, y2: 0, stroke: '#16a34a', 'stroke-width': 1.5, 'stroke-dasharray': '5,3' });
  s.appendChild(trueLine);
  const trueLbl = svg('text', { 'font-size': 11, fill: '#16a34a' }); s.appendChild(trueLbl);
  // path
  const path = svg('path', { fill: 'none', stroke: '#2563eb', 'stroke-width': 2 });
  s.appendChild(path);
  // points group
  const ptsG = svg('g'); s.appendChild(ptsG);
  container.appendChild(s);
  let nMesh = 1;
  const r = readout();
  const ctrls = controls();
  // sample data: deflection vs mesh size (h_mesh)
  // delta(h) = trueVal + a/h^? — model as delta = 10.7 + 5*h^1.5
  function delta(h) { return 10.7 + 4 * Math.pow(h, 1.5); }
  const minMesh = 0.125, maxMesh = 2;
  function update() {
    // pick nMesh points logarithmically spaced
    const meshes = [];
    for (let i = 0; i < nMesh; i++) {
      const f = i / Math.max(1, nMesh - 1);
      meshes.push(maxMesh * Math.pow(minMesh / maxMesh, f));
    }
    // X axis: log scale of mesh from minMesh to maxMesh; finer = right
    const xOf = h => 60 + (Math.log(maxMesh / h) / Math.log(maxMesh / minMesh)) * 520;
    const yMin = 10, yMax = 18;
    const yOf = v => 220 - ((v - yMin) / (yMax - yMin)) * 190;
    // ticks
    if (!s.querySelector('.ticks')) {
      const tg = svg('g'); tg.classList.add('ticks');
      [0.125, 0.25, 0.5, 1, 2].forEach(h => {
        const x = xOf(h);
        tg.appendChild(svg('line', { x1: x, y1: 220, x2: x, y2: 224, stroke: '#444' }));
        const t = svg('text', { x: x, y: 236, 'text-anchor': 'middle', 'font-size': 10, fill: '#666' });
        t.textContent = h; tg.appendChild(t);
      });
      [10, 12, 14, 16, 18].forEach(v => {
        const y = yOf(v);
        tg.appendChild(svg('line', { x1: 56, y1: y, x2: 60, y2: y, stroke: '#444' }));
        const t = svg('text', { x: 50, y: y + 3, 'text-anchor': 'end', 'font-size': 10, fill: '#666' });
        t.textContent = v; tg.appendChild(t);
      });
      s.appendChild(tg);
    }
    // true line
    trueLine.setAttribute('y1', yOf(10.7)); trueLine.setAttribute('y2', yOf(10.7));
    trueLbl.setAttribute('x', 70); trueLbl.setAttribute('y', yOf(10.7) - 4);
    trueLbl.textContent = 'true value ≈ 10.7 mm';
    // path + points
    let d = '';
    ptsG.innerHTML = '';
    meshes.forEach((h, i) => {
      const v = delta(h);
      const px = xOf(h), py = yOf(v);
      d += (i === 0 ? `M ${px} ${py}` : ` L ${px} ${py}`);
      const c = svg('circle', { cx: px, cy: py, r: 5, fill: '#2563eb', stroke: '#1e3a8a' });
      ptsG.appendChild(c);
      const lbl = svg('text', { x: px + 8, y: py - 6, 'font-size': 10, fill: '#1e3a8a' });
      lbl.textContent = `${v.toFixed(2)}`;
      ptsG.appendChild(lbl);
    });
    path.setAttribute('d', d);
    const lastMesh = meshes[meshes.length - 1];
    const lastDelta = delta(lastMesh);
    r.textContent = `Mesh refinements: ${nMesh}\nFinest mesh size: ${lastMesh.toFixed(3)} m → δ = ${lastDelta.toFixed(2)} mm\nGap to true value: ${(lastDelta - 10.7).toFixed(3)} mm\nAs h → 0, δ → 10.7 mm (the limit).`;
  }
  ctrls.appendChild(sliderRow('# of mesh refinements', 1, 6, 1, nMesh, v => v, v => { nMesh = v; update(); }));
  container.appendChild(ctrls);
  container.appendChild(r);
  update();
}
