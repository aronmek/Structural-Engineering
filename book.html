## Chapter 18 — Areas and Perimeters

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Area** | "AIR-ee-ah" | Amount of surface inside a shape | Cross-section A |
| **Perimeter** | "peh-RIM-ih-ter" | Total length around a shape | Bar circumference |
| **Rectangle** | "REK-tang-ul" | Four-sided shape, all right angles | Beam cross-section |
| **Trapezoid** | "TRAP-eh-zoyd" | Four sides, one pair parallel | Sloping girder |
| **Composite** | "kom-POZ-it" | Made of multiple simple shapes | I-beam, T-beam |
| **Flange** | "FLANJ" | Horizontal plate of an I-section | Top/bottom of I-beam |
| **Web** | "WEB" | Vertical plate of an I-section | Middle of I-beam |
| **Cross-section** | — | The shape you see when you slice a member | Section properties |

### B. Concept Introduction

The **cross-section** of a structural member is the shape you see if you cut the member perpendicular to its length. The **area** of the cross-section determines axial stress; the way the area is distributed (the geometry) determines bending stiffness.

> **Real-world analogy:** Cut a loaf of bread perpendicular to the length. The shape of the slice — round, square, oval — is the cross-section. Its area is how much bread you get; its shape determines how hard it is to bend a sandwich made from it.

### C. The Physics Behind It

In structural engineering, area appears everywhere:
- Axial stress: $\sigma = P/A$ — bigger $A$ means smaller stress
- Self-weight per length: $w_{sw} = \gamma \cdot A$ — bigger $A$ means heavier member
- Reinforcement ratio: $\rho = A_s / A_c$ — area of steel over area of concrete

### D. The Math

| Shape | Area | Perimeter |
|-------|------|-----------|
| Rectangle | $A = b \cdot h$ | $P = 2(b + h)$ |
| Triangle | $A = \tfrac{1}{2} b h$ | $P = a + b + c$ |
| Circle | $A = \pi r^2 = \dfrac{\pi d^2}{4}$ | $P = 2\pi r = \pi d$ |
| Trapezoid | $A = \tfrac{1}{2}(a + b) h$ | sum of all sides |

**Composite areas.** Split into simple shapes; add their areas (or subtract for holes).

```
I-section cross-section:

    ←──── b_f ────→
   ┌─────────────┐  ↑
   │   FLANGE    │ t_f
   └────┬───┬────┘  ↓
        │ W │       ↑
        │ E │
        │ B │      h
        │   │       
   ┌────┴───┴────┐  ↓ 
   │   FLANGE    │ t_f
   └─────────────┘  ↑
```

**Worked example.** I-section with $b_f = 200, t_f = 20, h_w = 360, t_w = 10$ (all mm). Total height = $h_w + 2 t_f = 400$.

$A = 2 \times (b_f \cdot t_f) + (h_w \cdot t_w) = 2 \times (200 \times 20) + (360 \times 10) = 8{,}000 + 3{,}600 = 11{,}600\ \mathrm{mm^2}$

### E. Structural Engineering Application

**Problem.** A steel column with the I-section above carries $P = 1{,}500\ \mathrm{kN}$. Find the axial stress.

$\sigma = P/A = 1{,}500{,}000 / 11{,}600 = 129.3\ \mathrm{MPa}$

For $F_y = 350\ \mathrm{MPa}$: DCR = 129.3 / 350 = 0.37 — safe.

### F. ETABS Connection

In **Define > Section Properties > Frame Sections**, when you choose a rectangular concrete or a built-up steel section, ETABS computes $A$ from the dimensions you enter. The same $A$ is used in:
- Self-weight calculation (with material density)
- Axial stress checks
- Stiffness matrix entries

> **Try it in ETABS 22:**
> 1. **Define > Section Properties > Frame Sections > Add New Property**
> 2. Choose Steel I-section, enter $b_f = 200, t_f = 20, h = 400, t_w = 10$
> 3. Click **Section Properties** — confirm $A = 11{,}600\ \mathrm{mm^2}$
> 4. Compare with your hand calculation

### G. Common Mistakes

1. **Forgetting to subtract for holes.** Hollow sections need area subtraction.
2. **Mixing units.** Keep all dimensions in the same unit (mm or m).
3. **Counting the flange-web overlap twice.** When using $h$ as total height, the web is only $h_w = h - 2t_f$.

### H. Chapter Practice Task — Hollow Box Section

> **Scenario:** A hollow rectangular tube, outside $300 \times 200$ mm, wall thickness $10$ mm. Find $A$ and $P$ (perimeter outside).
>
> **Worked Solution:**
>
> Outer area: $300 \times 200 = 60{,}000\ \mathrm{mm^2}$
> Inner cavity: $(300 - 2 \times 10) \times (200 - 2 \times 10) = 280 \times 180 = 50{,}400\ \mathrm{mm^2}$
> Net area: $A = 60{,}000 - 50{,}400 = 9{,}600\ \mathrm{mm^2}$
> Perimeter (outside): $2(300 + 200) = 1{,}000\ \mathrm{mm}$
>
> **ETABS:** Use **Section Designer** to draw outer rectangle, then a hole, click **Compute Section Properties** — $A$ should match 9,600 mm².

## Chapter 19 — Centroids

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Centroid** | "SEN-troyd" | Geometric center of a shape | Where it would balance |
| **Neutral axis** | "NOO-trul" | Horizontal line through centroid where bending stress = 0 | Bending |
| **Symmetry** | "SIH-meh-tree" | Mirror balance | Centroid lies on axis of symmetry |
| **Weighted average** | — | Average where each value has a "weight" | Centroid formula |
| **First moment of area** | — | $\Sigma A_i \cdot y_i$ | Used to find centroid |

### B. Concept Introduction

The centroid is the geometric center — the point where a shape would balance if cut from cardboard.

> **Real-world analogy:** Try to balance a cardboard cutout of a state on a pencil tip. The point where it sits perfectly is the centroid.

### C. The Physics Behind It

In a beam under bending, the **neutral axis** — the line where bending stress is zero — passes through the centroid of the cross-section. Compression occurs on one side of this line, tension on the other. Knowing the centroid's location is therefore the first step in computing bending stress.

### D. The Math

For a **simple symmetric** shape (rectangle, circle), the centroid is at the geometric center.

For a **composite** shape, the centroid is a weighted average:

$$\bar{y} = \dfrac{\sum (A_i \cdot y_i)}{\sum A_i}$$

Where:
- $A_i$ = area of part $i$
- $y_i$ = distance from a reference axis to the centroid of part $i$
- $\bar{y}$ = centroid of the whole

**Worked example.** A T-section: top flange $300 \times 100$ mm, web $100 \times 400$ mm. Find the centroid measured from the bottom.

```
        ←── 300 ──→
       ┌──────────┐  ↑
       │  FLANGE  │ 100
       └──┬────┬──┘  ↓
          │    │     ↑
          │WEB │
          │    │    400
          │    │
          │    │     ↓
          └────┘
          ←100→
```

| Part | Area $A_i$ (mm²) | $y_i$ from bottom (mm) | $A_i \cdot y_i$ |
|------|------------------|------------------------|-----------------|
| Web | $100 \times 400 = 40{,}000$ | $400/2 = 200$ | $8{,}000{,}000$ |
| Flange | $300 \times 100 = 30{,}000$ | $400 + 50 = 450$ | $13{,}500{,}000$ |
| **Sum** | $70{,}000$ | — | $21{,}500{,}000$ |

$\bar{y} = 21{,}500{,}000 / 70{,}000 = 307.14\ \mathrm{mm}$

The centroid is 307 mm above the bottom — closer to the flange than to the bottom of the web, since the flange concentrates a lot of area high up.

### E. Structural Engineering Application

For a T-beam, knowing $\bar{y}$ tells you:
- Where the neutral axis sits
- The distance to top fiber: $c_{top} = h - \bar{y}$
- The distance to bottom fiber: $c_{bot} = \bar{y}$

These distances are needed for the bending stress formula $\sigma = Mc/I$, where $c$ is different for top and bottom faces if the section is asymmetric.

In our T-section: $c_{top} = 500 - 307.14 = 192.86$ mm; $c_{bot} = 307.14$ mm.

Bending stress is therefore higher on the bottom face (since $c_{bot} > c_{top}$).

### F. ETABS Connection

In **Section Designer**, after drawing any cross-section, click **Properties**. ETABS reports the centroid coordinates, often shown as $C_y$, $C_z$.

> **Try it in ETABS 22:**
> 1. **Define > Section Properties > Frame Sections > Add New Property > Section Designer**
> 2. Draw a T-section using the polygon tool with the dimensions above
> 3. Click **Compute Section Properties**
> 4. The dialog shows centroid location — should match 307 mm

### G. Common Mistakes

1. **Wrong reference axis.** Be consistent — measure all $y_i$ from the same reference (usually the bottom).
2. **Using overall section centroid for $y_i$.** $y_i$ is the centroid of each *individual* sub-shape, not the whole.
3. **Forgetting symmetry shortcuts.** A symmetric section has its centroid on the axis of symmetry — no calculation needed.

### H. Chapter Practice Task — L-Section Centroid

> **Scenario:** An L-shape: vertical leg $20 \times 200$ mm; horizontal leg $200 \times 20$ mm; sharing the bottom-left corner. Find the centroid.
>
> **Worked Solution:**
>
> Place origin at bottom-left.
>
> | Part | $A_i$ (mm²) | $\bar{x}_i$ (mm) | $\bar{y}_i$ (mm) |
> |------|-------------|------------------|------------------|
> | Vertical leg ($20 \times 200$) | $4{,}000$ | $10$ | $100$ |
> | Horizontal leg ($200 \times 20$) | $4{,}000$ | $100$ | $10$ |
>
> Total area = $8{,}000\ \mathrm{mm^2}$ — but careful: the bottom-left $20 \times 20$ corner is shared. Subtract: $A_{shared} = 400\ \mathrm{mm^2}$, with centroid at $(10, 10)$.
>
> Better approach: vertical leg ($20 \times 200$, top of L), horizontal leg ($180 \times 20$, no overlap):
> | Part | $A_i$ | $\bar{x}_i$ | $\bar{y}_i$ |
> |------|-------|-------------|-------------|
> | Vertical | $20 \times 200 = 4{,}000$ | $10$ | $100$ |
> | Horizontal (excluding overlap) | $180 \times 20 = 3{,}600$ | $20 + 90 = 110$ | $10$ |
>
> $A_{total} = 7{,}600\ \mathrm{mm^2}$
> $\bar{x} = (4{,}000 \cdot 10 + 3{,}600 \cdot 110) / 7{,}600 = (40{,}000 + 396{,}000)/7{,}600 = 57.4\ \mathrm{mm}$
> $\bar{y} = (4{,}000 \cdot 100 + 3{,}600 \cdot 10) / 7{,}600 = (400{,}000 + 36{,}000)/7{,}600 = 57.4\ \mathrm{mm}$
>
> Symmetric L → centroid sits on the line of symmetry at (57.4, 57.4) — sanity check confirms.
>
> **ETABS:** Section Designer → draw L-shape → confirm centroid coords.

| Concept | Formula | Engineering Use | ETABS Location |
|---------|---------|----------------|----------------|
| Centroid | $\bar{y} = \Sigma(A_i y_i)/\Sigma A_i$ | Locate neutral axis | Section Designer Properties |
| Symmetric shape | Centroid on symmetry line | Quick lookup | Built-in shapes |
| $c_{top}, c_{bot}$ | From centroid to face | Bending stress check | Manual calc |

## Chapter 20 — Moment of Inertia (Second Moment of Area)

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Moment of inertia** | "in-ER-shuh" | Geometric measure of bending stiffness | $I$, mm⁴ |
| **Second moment of area** | — | Same as moment of inertia | Synonym |
| **Parallel axis theorem** | — | Shifts $I$ from one axis to a parallel axis | $I = I_c + Ad^2$ |
| **Strong axis** | — | The axis about which $I$ is largest | Major bending |
| **Weak axis** | — | The axis about which $I$ is smallest | Minor bending |
| **Radius of gyration** | "jy-RAY-shun" | $r = \sqrt{I/A}$, used in column buckling | Slenderness |

### B. Concept Introduction

Moment of inertia $I$ measures how spread out a section's area is from the axis of bending. The further the area sits from the axis, the larger $I$ becomes — and the stiffer the beam.

> **Real-world analogy:** A flat ruler is easy to bend if you bend it sideways; very hard to bend if you turn it on edge. Same ruler, same area — but the depth in the direction of bending changes $I$ by a huge amount.

### C. The Physics Behind It

In bending, fibers far from the neutral axis stretch and compress more, contributing more resistance. The contribution of each tiny area $dA$ to bending resistance is $y^2 \cdot dA$ (note the square). Adding these up:

$$I = \int y^2 \, dA$$

For practical engineering, we don't compute the integral — we use formulas for common shapes:

| Shape | $I$ about centroidal axis |
|-------|--------------------------|
| Rectangle (about horizontal) | $I = bh^3/12$ |
| Rectangle (about vertical) | $I = hb^3/12$ |
| Circle (any diameter) | $I = \pi d^4/64$ |
| Hollow circle | $I = \pi(d_o^4 - d_i^4)/64$ |

### D. The Math

**Parallel Axis Theorem:**
$$I_{any\ axis} = I_{centroidal} + A \cdot d^2$$
where $d$ is the distance from the part's own centroid to the new axis.

For composite sections, compute $I$ of each part about its own centroid, then shift to the overall centroid:
$$I_{total} = \sum \left( I_{c,i} + A_i \cdot d_i^2 \right)$$

**Worked example.** Same T-section as Chapter 19. Total centroid at $\bar{y} = 307.14$ mm from bottom.

| Part | $A_i$ | Own $I_{c,i}$ (mm⁴) | $d_i$ from part centroid to $\bar{y}$ | $A_i d_i^2$ |
|------|-------|---------------------|---------------------------------------|--------------|
| Web ($100 \times 400$) | $40{,}000$ | $100 \cdot 400^3 / 12 = 5.333 \times 10^8$ | $307.14 - 200 = 107.14$ | $40{,}000 \times 107.14^2 = 4.59 \times 10^8$ |
| Flange ($300 \times 100$) | $30{,}000$ | $300 \cdot 100^3 / 12 = 2.5 \times 10^7$ | $450 - 307.14 = 142.86$ | $30{,}000 \times 142.86^2 = 6.12 \times 10^8$ |

$I_{total} = 5.333 \times 10^8 + 4.59 \times 10^8 + 0.25 \times 10^8 + 6.12 \times 10^8 = 1.63 \times 10^9\ \mathrm{mm^4}$

This $I$ is what governs bending stiffness for the T-section.

### E. Structural Engineering Application

**Cube law in action.** Compare two beams of equal area:
- Beam A: $b = 200, h = 400$ → $I = 200 \cdot 400^3 / 12 = 1.067 \times 10^9$ mm⁴
- Beam B: $b = 100, h = 800$ → $I = 100 \cdot 800^3 / 12 = 4.267 \times 10^9$ mm⁴

Ratio: B has 4× the $I$ of A despite same area — and would deflect 4× less under the same load. **Depth dominates stiffness.**

### F. ETABS Connection

ETABS reports $I_{33}$ (about the strong axis, used for major-axis bending) and $I_{22}$ (about the weak axis, used for minor-axis bending). For an I-beam laid flat (web horizontal), $I_{33}$ might be much smaller than the engineer expects — always confirm orientation.

> **Try it in ETABS 22:**
> 1. **Define > Section Properties > Frame Sections** → pick any beam → click **Section Properties**
> 2. Read $I_{33}$ and $I_{22}$ — these are the moments of inertia about the major and minor axes
> 3. Verify by hand using $I = bh^3/12$ for rectangles or the composite method for I-shapes

### G. Common Mistakes

1. **Forgetting parallel axis.** $I_{c}$ alone is not enough when the part isn't centered on the overall centroid.
2. **Confusing $I_{33}$ and $I_{22}$.** ETABS uses 3-3 = strong axis; 2-2 = weak axis.
3. **Wrong units.** $I$ has units of length⁴ — not mm³ or mm².

### H. Chapter Practice Task — Compute $I$ for a Built-up I-Section

> **Scenario:** I-section: top flange $300 \times 25$, bottom flange $300 \times 25$, web $20 \times 450$ (all mm). Symmetric → centroid at mid-height. Compute $I_{33}$ (about horizontal centroidal axis).
>
> **Worked Solution:**
>
> Total height = $25 + 450 + 25 = 500$ mm; centroid at 250 mm from bottom.
>
> | Part | $A$ | Own $I_c$ | $d$ to centroid | $A d^2$ |
> |------|-----|-----------|-----------------|---------|
> | Top flange | $7{,}500$ | $300 \cdot 25^3/12 = 3.91 \times 10^5$ | $237.5$ | $7{,}500 \cdot 237.5^2 = 4.23 \times 10^8$ |
> | Web | $9{,}000$ | $20 \cdot 450^3/12 = 1.519 \times 10^8$ | $0$ | $0$ |
> | Bottom flange | $7{,}500$ | $3.91 \times 10^5$ | $237.5$ | $4.23 \times 10^8$ |
>
> $I_{33} = 2(3.91 \times 10^5) + 1.519 \times 10^8 + 2(4.23 \times 10^8) = 7.82 \times 10^5 + 1.519 \times 10^8 + 8.46 \times 10^8$
> $\approx 9.99 \times 10^8\ \mathrm{mm^4}$
>
> **ETABS:** Section Designer → build same I-section → confirm $I_{33} \approx 1.0 \times 10^9\ \mathrm{mm^4}$.

## Chapter 21 — Vectors

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Vector** | "VEK-tor" | A quantity with magnitude and direction | Force, displacement |
| **Scalar** | "SKAY-ler" | A quantity with magnitude only | Mass, temperature |
| **Component** | "kom-POH-nent" | Projection of a vector onto an axis | $F_x$, $F_y$ |
| **Resultant** | "rih-ZUL-tant" | The single vector equivalent to several combined | Net force |
| **Unit vector** | — | A vector of length 1 used to indicate direction | $\hat{i}, \hat{j}, \hat{k}$ |

### B. Concept Introduction

A scalar is just a number with units (mass, temperature). A vector is a number plus a direction (force, velocity, displacement). Adding vectors is *not* the same as adding scalars — direction matters.

> **Real-world analogy:** Walking 3 km north then 4 km east doesn't put you 7 km away from start — it puts you 5 km away (along the diagonal). That diagonal is the resultant vector.

### C. The Physics Behind It

Forces are vectors. To analyze any structure with forces in multiple directions, you must:

1. Pick a coordinate system (typically X horizontal, Y vertical for 2D)
2. Resolve every force into its X and Y **components**
3. Sum components separately

Then the equilibrium equations $\Sigma F_x = 0$ and $\Sigma F_y = 0$ apply directly.

### D. The Math

**Component decomposition** of a force $F$ acting at angle $\theta$ from the x-axis:
$$F_x = F \cos\theta \qquad F_y = F \sin\theta$$

**Resultant** of two perpendicular components:
$$R = \sqrt{F_x^2 + F_y^2}$$

**Direction** of the resultant:
$$\theta = \tan^{-1}\left(\dfrac{F_y}{F_x}\right)$$

**Adding two vectors $\vec{A}$ and $\vec{B}$:**
$$R_x = A_x + B_x \qquad R_y = A_y + B_y$$

**Worked example.** A force $F = 50\ \mathrm{kN}$ acts at $30°$ above horizontal. Find $F_x$ and $F_y$.

$F_x = 50 \cos(30°) = 50 \times 0.866 = 43.30\ \mathrm{kN}$
$F_y = 50 \sin(30°) = 50 \times 0.500 = 25.00\ \mathrm{kN}$

```
            F = 50 kN
              ↗
            ↗   ↑ Fy = 25
          ↗     │
        ↗       │
      ────────────→ Fx = 43.3
       30°
```

### E. Structural Engineering Application

**Problem.** A roof truss diagonal carries a tensile force $F = 80\ \mathrm{kN}$ at $60°$ above horizontal. Find the horizontal and vertical components transmitted to the supporting column.

$F_x = 80 \cos(60°) = 80 \times 0.5 = 40\ \mathrm{kN}$
$F_y = 80 \sin(60°) = 80 \times 0.866 = 69.3\ \mathrm{kN}$

The column receives 40 kN horizontal and 69.3 kN vertical from the truss diagonal.

### F. ETABS Connection

In ETABS, every force is a vector. When you assign **Joint Loads > Forces**, you enter Fx, Fy, Fz components separately. ETABS does not resolve angles for you — you must compute components first.

> **Try it in ETABS 22:**
> 1. **Assign > Joint Loads > Forces**
> 2. The dialog has six fields: Fx, Fy, Fz, Mx, My, Mz
> 3. To apply a 50 kN force at 30° in the XZ plane: enter Fx = 43.3, Fz = -25 (negative if downward), leave others zero
> 4. Click OK; visualize with **Display > Show Loads**

### G. Common Mistakes

1. **Confusing sin and cos.** $\cos$ pairs with the side adjacent to the angle. Sketch always before computing.
2. **Sign of components.** A downward Y component is negative.
3. **Adding magnitudes directly.** Two 50 kN forces at right angles give a resultant of $\sqrt{50^2 + 50^2} = 70.7$ kN — not 100.

### H. Chapter Practice Task — Combining Two Forces

> **Scenario:** Two cables pull on a node: cable 1 has $F_1 = 60\ \mathrm{kN}$ at $20°$ above horizontal (right); cable 2 has $F_2 = 80\ \mathrm{kN}$ at $50°$ above horizontal (also right). Find the resultant.
>
> **Worked Solution:**
>
> $F_{1x} = 60 \cos 20° = 56.38$; $F_{1y} = 60 \sin 20° = 20.52$
> $F_{2x} = 80 \cos 50° = 51.42$; $F_{2y} = 80 \sin 50° = 61.28$
> $R_x = 56.38 + 51.42 = 107.80\ \mathrm{kN}$
> $R_y = 20.52 + 61.28 = 81.80\ \mathrm{kN}$
> $R = \sqrt{107.80^2 + 81.80^2} = \sqrt{11{,}620.84 + 6{,}691.24} = \sqrt{18{,}312.08} = 135.32\ \mathrm{kN}$
> $\theta = \tan^{-1}(81.80 / 107.80) = \tan^{-1}(0.7588) = 37.20°$
>
> **ETABS:** Apply two joint loads with these components, run analysis, read the reaction at the supported node — should be 135.3 kN at 37.2°.

## Chapter 22 — Right Triangle Trigonometry

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Sine** | "SINE" | Opposite over hypotenuse | $\sin\theta$ |
| **Cosine** | "KOH-sine" | Adjacent over hypotenuse | $\cos\theta$ |
| **Tangent** | "TAN-jent" | Opposite over adjacent | $\tan\theta$ |
| **Hypotenuse** | "hy-POT-en-yoos" | Longest side, opposite the right angle | Diagonal brace |
| **Opposite** | "OP-oh-zit" | Side across from the angle of interest | Vertical leg in a slope |
| **Adjacent** | "ah-JAY-sent" | Side next to the angle (not the hypotenuse) | Horizontal leg |
| **SOH-CAH-TOA** | — | Mnemonic for the three ratios | Memory aid |

### B. Concept Introduction

Trigonometry is the math of triangles. A right triangle has one $90°$ angle. The three trig functions — sine, cosine, tangent — relate the sides and angles. They are the bridge between physical geometry (a roof slope, a brace angle) and the components engineers compute.

> **Real-world analogy:** A ramp. If you know its angle and length, trig tells you exactly how high it rises and how far it runs horizontally.

### C. The Physics Behind It

Inclined loads, sloping members, and lateral bracing all involve triangles. To analyze them, you decompose forces into perpendicular components — and trigonometry gives you the components from the angles.

### D. The Math

```
            *
           /│
          / │
         /  │ Opposite
        /   │
       / θ  │
      *─────*
      Adjacent
       Hypotenuse = side from θ to opposite-end vertex (the longest side)
```

| Function | Definition | Mnemonic |
|----------|-----------|----------|
| $\sin\theta$ | Opposite / Hypotenuse | **S**OH |
| $\cos\theta$ | Adjacent / Hypotenuse | **C**AH |
| $\tan\theta$ | Opposite / Adjacent | **T**OA |

**Common angle values to memorize:**

| $\theta$ | $\sin\theta$ | $\cos\theta$ | $\tan\theta$ |
|----------|-------------|-------------|-------------|
| $0°$ | $0$ | $1$ | $0$ |
| $30°$ | $0.500$ | $0.866$ | $0.577$ |
| $45°$ | $0.707$ | $0.707$ | $1.000$ |
| $60°$ | $0.866$ | $0.500$ | $1.732$ |
| $90°$ | $1$ | $0$ | $\infty$ |

**Worked example.** A diagonal brace in a frame has length $L = 5\ \mathrm{m}$ and rises at $40°$ from horizontal. Find horizontal run and vertical rise.

Horizontal run = $L \cos(40°) = 5 \times 0.766 = 3.83\ \mathrm{m}$
Vertical rise = $L \sin(40°) = 5 \times 0.643 = 3.21\ \mathrm{m}$

### E. Structural Engineering Application

**Problem.** A 12 kN load acts on a roof rafter sloped at $25°$. Resolve into components perpendicular and parallel to the rafter (for purlin design).

Perpendicular to rafter = $12 \cos(25°) = 12 \times 0.906 = 10.87\ \mathrm{kN}$
Parallel to rafter = $12 \sin(25°) = 12 \times 0.423 = 5.07\ \mathrm{kN}$

The perpendicular component creates bending; the parallel component creates axial force.

### F. ETABS Connection

When entering inclined loads in ETABS, you must trigonometrically resolve them into the global X, Y, Z components first. ETABS does not interpret angles — it only accepts components.

> **Try it in ETABS 22:**
> 1. **Assign > Frame Loads > Distributed**
> 2. To apply a 12 kN/m load perpendicular to a 25°-sloped rafter: enter the load in the local axis 2 direction (which is perpendicular to the member by default)
> 3. Or compute $w \cos 25° = 10.87$ in global Z (gravity), enter that — the BMD will reflect this projection

### G. Common Mistakes

1. **Calculator in degree vs radian mode.** Always check. $\sin(30°) = 0.5$, but $\sin(30\ \mathrm{rad}) = -0.988$.
2. **Wrong "opposite" side.** It's opposite the angle you're using.
3. **Mixing up sin and cos when "horizontal" and "vertical" are confused.** Always sketch first.

### H. Chapter Practice Task — Sloped Roof Load

> **Scenario:** A roof truss member is inclined $35°$ from horizontal. A vertical gravity load of $8\ \mathrm{kN/m}$ acts on the projected horizontal length. Convert to load along the rafter.
>
> **Worked Solution:**
>
> The vertical load $w_v = 8\ \mathrm{kN/m}$ on horizontal projection. Length of rafter per unit horizontal = $1/\cos(35°)$ → load per length along rafter = $w_v \cos(35°) = 8 \times 0.819 = 6.55\ \mathrm{kN/m}$.
>
> Decompose into perpendicular (causes bending) and parallel (axial):
> Perpendicular: $w_v \cos(35°)^2 = 8 \times 0.671 = 5.37\ \mathrm{kN/m}$
> Parallel: $w_v \cos(35°) \sin(35°) = 8 \times 0.819 \times 0.574 = 3.76\ \mathrm{kN/m}$
>
> **ETABS:** Build a 35° rafter element, apply Z = -8 kN/m. ETABS handles the inclined geometry; the resulting bending and axial follow the trig automatically.

| Cosine | $\cos\theta = A/H$ | Horizontal component | Manual, then Joint Loads |
| Tangent | $\tan\theta = O/A$ | Slope angle from rise/run | Manual |

## Chapter 23 — The Pythagorean Theorem

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Pythagorean** | "pih-THAG-oh-REE-an" | Named after Pythagoras | $a^2 + b^2 = c^2$ |
| **Theorem** | "THEE-oh-rem" | A mathematical statement that has been proven | Pythagorean theorem |
| **Right angle** | — | $90°$ angle | Corner of a rectangle |
| **Legs** | — | The two shorter sides of a right triangle | $a$, $b$ |

### B. Concept Introduction

For any right triangle, the square of the hypotenuse equals the sum of the squares of the other two sides.

> **Real-world analogy:** Walk 3 m east, then 4 m north. Your straight-line distance from start is 5 m — because $3^2 + 4^2 = 9 + 16 = 25$, and $\sqrt{25} = 5$.

### C. The Physics Behind It

Whenever you combine two perpendicular components — horizontal/vertical, X/Y, force in two axes — the resultant magnitude follows Pythagoras. It also gives you exact diagonal lengths in framing geometry.

### D. The Math

$$a^2 + b^2 = c^2 \quad \mathrm{where}\ c\ \mathrm{is\ the\ hypotenuse}$$

Solve for $c$: $c = \sqrt{a^2 + b^2}$

**Worked example.** Diagonal brace from $(0,0)$ to $(4, 3)$ m: length = $\sqrt{16 + 9} = 5$ m.

### E. Structural Engineering Application

**Problem.** A column grid is 6 m × 8 m. A diagonal X-brace runs from corner to corner across one bay. Find the brace's length.

$L_{brace} = \sqrt{6^2 + 8^2} = \sqrt{36 + 64} = \sqrt{100} = 10\ \mathrm{m}$

**Problem.** A column carries axial $P = 200\ \mathrm{kN}$ and shear $V = 75\ \mathrm{kN}$. Find the resultant force magnitude.

$R = \sqrt{200^2 + 75^2} = \sqrt{40{,}000 + 5{,}625} = \sqrt{45{,}625} = 213.6\ \mathrm{kN}$

### F. ETABS Connection

ETABS uses the distance formula (Pythagorean in coordinates) to compute every member length from joint coordinates. You can verify any member's length using your hand calculation.

> **Try it in ETABS 22:**
> 1. **Edit > Interactive Database Editing > Joints** — read coordinates of the brace endpoints
> 2. Apply Pythagoras: $L = \sqrt{(\Delta x)^2 + (\Delta y)^2 + (\Delta z)^2}$
> 3. Compare to ETABS's Frame property "Length" field — they should match exactly

### G. Common Mistakes

1. **Adding magnitudes directly.** $3 + 4 \neq 5$ — only the squares add.
2. **Forgetting it requires a right angle.** For non-right triangles, use the cosine rule (Chapter 24).
3. **Sign confusion.** $a$ and $b$ are lengths, always positive.

### H. Chapter Practice Task — Bracing in 3D

> **Scenario:** A 3D bracing element runs from joint A at $(0, 0, 0)$ to joint B at $(4, 3, 5)$ m. Find its length.
>
> **Worked Solution:**
>
> $L = \sqrt{4^2 + 3^2 + 5^2} = \sqrt{16 + 9 + 25} = \sqrt{50} = 7.071\ \mathrm{m}$
>
> **ETABS:** Verify by reading joint coords and member length.

| 3D distance | $\sqrt{x^2+y^2+z^2}$ | Skew brace length | Frame Length |

## Chapter 24 — Trigonometry for Non-Right Triangles

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Sine rule** | — | Relates sides and opposite angles | Truss geometry |
| **Cosine rule** | — | Generalizes Pythagoras | Truss geometry |
| **Oblique** | "oh-BLEEK" | Not a right triangle | Truss panels |
| **Included angle** | — | Angle between two known sides | Cosine rule application |

### B. Concept Introduction

Many real triangles in trusses and bracing are not right-angled. Two general rules cover them: the **sine rule** and the **cosine rule**.

### C. The Physics Behind It

Truss panels often form scalene triangles (no right angles). Computing member lengths and angles requires these rules.

### D. The Math

```
       C
      / \
     /   \
   b/     \a
   /       \
  /  γ      \
 /-α______β-\
A     c     B
```

Sides $a, b, c$ opposite angles $A, B, C$.

**Sine rule:**
$$\dfrac{a}{\sin A} = \dfrac{b}{\sin B} = \dfrac{c}{\sin C}$$

**Cosine rule:**
$$c^2 = a^2 + b^2 - 2ab\cos C$$

**Worked example.** A truss panel: side $a = 4$ m, side $b = 5$ m, included angle $C = 70°$. Find side $c$.

$c^2 = 16 + 25 - 2(4)(5)\cos 70° = 41 - 40(0.342) = 41 - 13.68 = 27.32$
$c = \sqrt{27.32} = 5.23\ \mathrm{m}$

### E. Structural Engineering Application

**Problem.** A truss has top chord $a = 6\ \mathrm{m}$ and diagonal $b = 4\ \mathrm{m}$, with included angle $30°$. Find the bottom chord length and the other angles.

Cosine rule: $c^2 = 36 + 16 - 48\cos 30° = 52 - 41.57 = 10.43$ → $c = 3.23\ \mathrm{m}$

Sine rule for angle A (opposite $a$):
$\sin A / a = \sin C / c$ → $\sin A = (a / c)\sin C = (6/3.23)(0.5) = 0.929$ → $A = 68.32°$
$B = 180 - 30 - 68.32 = 81.68°$

### F. ETABS Connection

When laying out truss geometry from drawings, you often have a panel angle and two member lengths and need to verify the third. The cosine rule confirms member lengths before you draw nodes in ETABS.

> **Try it in ETABS 22:**
> 1. Compute joint coordinates from your hand triangle calculations
> 2. **Edit > Grid Data** or directly **Draw > Frame Object** with explicit start/end coordinates
> 3. Verify member length matches your cosine-rule answer

### G. Common Mistakes

1. **Wrong angle in cosine rule.** $C$ must be the angle between sides $a$ and $b$ (the included angle).
2. **Calculator mode.** Radians vs degrees again.
3. **Ambiguous case in sine rule.** Two triangles can sometimes satisfy the same data; always sketch.

### H. Chapter Practice Task — Truss Panel Geometry

> **Scenario:** A truss panel has bottom chord 8 m, vertical post 3 m at the right end, and a diagonal connecting the top-of-post to the left end of the bottom chord. Find the diagonal length and the angle it makes with the bottom chord.
>
> **Worked Solution:**
>
> Right triangle (vertical post is at 90°). Diagonal $d = \sqrt{8^2 + 3^2} = \sqrt{73} = 8.544\ \mathrm{m}$. Angle = $\tan^{-1}(3/8) = 20.56°$ from horizontal.
>
> **ETABS:** Place joints at $(0,0,0)$, $(8,0,0)$, $(8,0,3)$. Draw frames, verify member lengths.

| Cosine rule | $c^2 = a^2 + b^2 - 2ab\cos C$ | Generalized Pythagoras | Manual layout |

## Chapter 25 — Coordinate Geometry

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Coordinate** | "koh-OR-dih-nut" | A number that locates a point | $(x, y, z)$ |
| **Cartesian** | "kar-TEE-zhun" | The standard X-Y(-Z) grid | Coordinate system |
| **Origin** | "OR-ih-jin" | The $(0,0,0)$ reference point | Building corner |
| **Distance formula** | — | Length between two points | Member length |
| **Slope** | "SLOPE" | Steepness of a line, $\Delta y / \Delta x$ | Roof slope |
| **Midpoint** | "MID-poynt" | The average of two endpoints | Centerline |

### B. Concept Introduction

Coordinate geometry assigns numbers (coordinates) to points so we can do geometry algebraically. Every joint in a structural model has $(x, y, z)$ coordinates; every member length, angle, and grid intersection comes from coordinate calculations.

### C. The Physics Behind It

ETABS stores every joint's location as $(x, y, z)$. Member lengths come from the 3D distance formula. Forces and displacements at each joint are vectors in this coordinate system.

### D. The Math

**Distance between two points** in 2D:
$$d = \sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2}$$

In 3D:
$$d = \sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2 + (z_2 - z_1)^2}$$

**Midpoint:**
$$M = \left(\dfrac{x_1 + x_2}{2}, \dfrac{y_1 + y_2}{2}\right)$$

**Slope** of a line from $(x_1, y_1)$ to $(x_2, y_2)$:
$$m = \dfrac{y_2 - y_1}{x_2 - x_1}$$

**Worked example.** Joint A at $(0, 0)$, joint B at $(8, 6)$. Find member length, midpoint, slope.

Length: $\sqrt{64 + 36} = \sqrt{100} = 10$ m
Midpoint: $(4, 3)$
Slope: $6/8 = 0.75$ → angle = $\tan^{-1}(0.75) = 36.87°$

### E. Structural Engineering Application

**Problem.** A column grid: gridline 1 at $x = 0$, gridline 2 at $x = 6$, gridline 3 at $x = 12$. Y-axis: gridline A at $y = 0$, B at $y = 5$, C at $y = 10$. Story 2 is at $z = 4$. Find the coordinates of joint at intersection of grid 2-B-Story2.

Coords: $(6, 5, 4)$ m.

Length of a beam between joints (2-B-2) and (3-B-2): $\sqrt{(12-6)^2 + 0 + 0} = 6$ m.

Length of a brace from (1-A-1) at $(0, 0, 0)$ to (2-A-2) at $(6, 0, 4)$: $\sqrt{36 + 16} = \sqrt{52} = 7.21$ m.

### F. ETABS Connection

In ETABS:
- **Edit > Grid Data** sets up the coordinate system
- Every joint inherits a coordinate from the grid intersection
- **Edit > Interactive Database Editing > Joints** lets you view/edit raw coordinates
- Member lengths are computed automatically from joint coordinates

> **Try it in ETABS 22:**
> 1. **Define > Grid System Data > Modify/Show System** — create grid A, B, C at y=0, 5, 10 and 1, 2, 3 at x=0, 6, 12
> 2. Set story heights = 4 m
> 3. Draw a column at intersection 2-B
> 4. Click the column → **Display Frame Properties** — read length = 4 m
> 5. **Edit > Interactive Database Editing > Joints** — verify joint coordinates

### G. Common Mistakes

1. **Wrong axis convention.** ETABS uses Z = vertical (up). Some textbooks use Y = vertical. Stay with one.
2. **Negative coordinates.** Common when origin is at a corner — keep signs straight.
3. **Forgetting Z when computing 3D distances.** A "vertical" member appears as $\Delta x = \Delta y = 0$, $\Delta z =$ length.

### H. Chapter Practice Task — Member Length and Direction

> **Scenario:** A diagonal brace runs from joint A at $(2, 1, 0)$ to joint B at $(7, 4, 4)$ m. Find length and angle from horizontal.
>
> **Worked Solution:**
>
> $\Delta x = 5, \Delta y = 3, \Delta z = 4$
> Horizontal projection: $\sqrt{25 + 9} = \sqrt{34} = 5.83$ m
> Total length: $\sqrt{34 + 16} = \sqrt{50} = 7.07$ m
> Angle from horizontal: $\tan^{-1}(4 / 5.83) = 34.45°$
>
> **ETABS:** Place joints at exact coordinates, draw brace, confirm length.

## Chapter 26 — Polynomials and the Bending Moment Equation

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Polynomial** | "pol-ee-NOH-mee-ul" | Sum of terms with whole-number powers of a variable | $ax^2 + bx + c$ |
| **Term** | "TURM" | One piece separated by + or − | $3x^2$ is a term |
| **Degree** | "deh-GREE" | Highest exponent in the polynomial | $ax^2$ has degree 2 |
| **Leading coefficient** | — | Number multiplying the highest-degree term | The $a$ in $ax^2$ |
| **Roots** | — | Values of $x$ where polynomial = 0 | Zero crossings |

### B. Concept Introduction

A polynomial is built from $x^0, x^1, x^2, x^3, \ldots$ — each multiplied by a coefficient. The **degree** is the biggest exponent. Linear polynomials are degree 1 (straight line); quadratic are degree 2 (parabola); cubic are degree 3 (S-curve).

In structural engineering, polynomial functions describe shear and moment along a beam. Recognizing the degree tells you the diagram's shape.

### C. The Physics Behind It

For a simply supported beam with a uniform load $w$ over span $L$:

- Shear force: $V(x) = \frac{wL}{2} - wx$ — degree 1 (linear)
- Bending moment: $M(x) = \frac{wL}{2}x - \frac{w}{2}x^2$ — degree 2 (parabolic)
- Deflection: $\delta(x) \propto x(L^3 - 2Lx^2 + x^3)$ — degree 4 (quartic)

Each integration of load increases degree by one. Loading is degree 0 (constant); shear degree 1; moment degree 2; slope degree 3; deflection degree 4. This pattern repeats throughout structural mechanics.

### D. The Math

**Adding polynomials.** Combine like terms (same exponent).
$(3x^2 + 2x) + (x^2 - 5) = 4x^2 + 2x - 5$

**Multiplying.**
$(x + 2)(x - 3) = x^2 - 3x + 2x - 6 = x^2 - x - 6$

**Factoring** (reverse of multiplying).
$x^2 - x - 6 = (x - 3)(x + 2)$

**Worked example.** $M(x) = 30x - 5x^2$. Find roots (where $M = 0$).

Factor: $x(30 - 5x) = 0$ → $x = 0$ or $x = 6$. The moment is zero at supports.

### E. Structural Engineering Application

**Problem.** A simply supported beam $L = 10\ \mathrm{m}$ carries $w = 8\ \mathrm{kN/m}$. Write $V(x)$ and $M(x)$, evaluate at $x = 0, 2.5, 5, 7.5, 10$, and identify the maximum moment.

Reactions: $R_A = R_B = 40$ kN.

$V(x) = 40 - 8x$
$M(x) = 40x - 4x^2$

| $x$ | $V$ | $M$ |
|-----|-----|-----|
| 0 | 40 | 0 |
| 2.5 | 20 | 75 |
| 5 | 0 | 100 |
| 7.5 | −20 | 75 |
| 10 | −40 | 0 |

Maximum at $x = 5$: $M_{\max} = 100\ \mathrm{kN \cdot m}$ (= $wL^2/8 = 8 \cdot 100/8$ ✓).

### F. ETABS Connection

ETABS plots these polynomials as diagrams. Linear shear → straight line; parabolic moment → smooth curve; cubic deflection → smooth S-shape between supports.

> **Try it in ETABS 22:**
> 1. Build the 10 m beam, $w = 8\ \mathrm{kN/m}$
> 2. **Display > Show Frame Forces > Shear 2-2** — confirm linear, $V = \pm 40$ at supports
> 3. **Display > Show Frame Forces > Moment 3-3** — confirm parabola peaking at 100 kN·m
> 4. **Display > Show Deformed Shape** — confirm smooth quartic deflection

### G. Common Mistakes

1. **Mixing up shear (linear) with moment (parabolic).** They're plotted on different diagrams; never confuse the shapes.
2. **Forgetting that maximum moment occurs where shear = 0.** $V = dM/dx$, so peak $M$ ↔ zero $V$.
3. **Not closing parentheses in computer formulas.** Many engineers swap $-w/2 \cdot x^2$ for $-w/2 x^2$ — algebraically the same but easily mistyped.

### H. Chapter Practice Task — Two-Span Continuous Beam

> **Scenario:** A 12 m beam supported at three points (each 6 m apart) with $w = 10\ \mathrm{kN/m}$. The continuous-beam formula gives $M_{support} = -wL^2/8 = -45$ kN·m at the middle support and $M_{span} = +9wL^2/128$ at mid-span.
>
> **Tasks:**
> 1. Compute support and span moments
> 2. Sketch the BMD shape (negative over support, positive at mid-span)
> 3. Verify in ETABS

> **Worked Solution:**
>
> $M_{support} = -10 \cdot 36 / 8 = -45\ \mathrm{kN \cdot m}$
> $M_{span} = 9 \cdot 10 \cdot 36 / 128 = 25.31\ \mathrm{kN \cdot m}$
>
> Diagram: parabola dipping to $-45$ over the middle support and rising to $+25$ in each span.
>
> **ETABS:** Build a 12 m frame on three supports (pin at each end, roller in middle), apply UDL, run analysis, view BMD — should match.

## Chapter 27 — Rational Functions and Proportionality

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Proportion** | "proh-POR-shun" | Relationship where ratio is constant | $y \propto x$ |
| **Directly proportional** | — | $y$ doubles when $x$ doubles | $y = kx$ |
| **Inversely proportional** | — | $y$ halves when $x$ doubles | $y = k/x$ |
| **Rational function** | "RASH-un-ul" | A fraction with polynomials | $y = (x+1)/(x-2)$ |
| **Power law** | — | $y = kx^n$ | Cube law: $y \propto x^3$ |

### B. Concept Introduction

Two quantities are **directly proportional** if their ratio is constant: $y/x = k$. They are **inversely proportional** if their product is constant: $xy = k$. Many structural relationships are proportionalities — understanding them lets you predict how a result changes when an input changes, without redoing the whole calculation.

### C. The Physics Behind It

| Quantity | Proportional to | Reason |
|---------|-----------------|--------|
| Stress $\sigma$ | $\propto P$ (force) | $\sigma = P/A$ |
| Stress $\sigma$ | $\propto 1/A$ (area) | $\sigma = P/A$ |
| Deflection $\delta$ | $\propto w$ (load) | Linear elastic |
| Deflection $\delta$ | $\propto L^4$ (span) | $\delta = 5wL^4/384EI$ |
| Deflection $\delta$ | $\propto 1/I$ | Stiffer ⇒ less deflection |
| Deflection $\delta$ | $\propto 1/E$ | Stiffer material ⇒ less deflection |
| Buckling load $P_{cr}$ | $\propto 1/L^2$ | $P_{cr} = \pi^2 EI/L^2$ |

The most striking is **$\delta \propto L^4$**: doubling span multiplies deflection by 16!

### D. The Math

**Direct proportion:** $y = kx$ → if $x$ scales by $f$, $y$ scales by $f$.

**Inverse proportion:** $y = k/x$ → if $x$ scales by $f$, $y$ scales by $1/f$.

**Power law:** $y = kx^n$ → if $x$ scales by $f$, $y$ scales by $f^n$.

**Worked example.** A beam deflects 5 mm under load. If span doubles, by what factor does deflection grow?

Since $\delta \propto L^4$, doubling $L$ multiplies $\delta$ by $2^4 = 16$. New deflection ≈ $80$ mm.

### E. Structural Engineering Application

**Problem.** A 6 m beam deflects 8 mm. Span is increased to 9 m (factor 1.5×) with the same beam, same load per length. Predict the new deflection.

$\delta_{new}/\delta_{old} = (L_{new}/L_{old})^4 = 1.5^4 = 5.0625$
$\delta_{new} = 8 \times 5.0625 = 40.5\ \mathrm{mm}$

**Problem.** Same beam, original 6 m span, but you double the moment of inertia (deeper beam). Predict deflection.

$\delta \propto 1/I$ → factor 1/2 → new deflection = 4 mm.

These shortcuts let you size members in seconds.

### F. ETABS Connection

ETABS will compute exact deflections — but proportional reasoning before running ETABS lets you predict whether a design change moves the answer the right direction and by roughly how much. After running, proportionality also helps you sanity-check the result.

> **Try it in ETABS 22:**
> 1. Run a model; note max deflection
> 2. Modify section depth (which scales $I$ by some factor)
> 3. Re-run; verify the new deflection follows the predicted proportional change

### G. Common Mistakes

1. **Treating $L$ linearly when it's quartic.** Doubling span ≠ doubling deflection.
2. **Mixing $E$ and $I$ scaling.** They're independent factors in $\delta \propto 1/(EI)$.
3. **Forgetting the load also scales.** If span doubles AND $w$ stays per-meter, the total load also doubles — additional factor.

### H. Chapter Practice Task — Compare Two Beam Designs

> **Scenario:** Original: $L = 5$ m, $h = 400$ mm, $\delta = 6$ mm. New: $L = 7$ m, $h = 600$ mm. Same width, same load per meter, same material. Predict $\delta_{new}$.
>
> **Worked Solution:**
>
> Span ratio: $7/5 = 1.4$. $L^4$ factor: $1.4^4 = 3.842$
> Depth ratio: $600/400 = 1.5$. $I$ factor: $1.5^3 = 3.375$. So $1/I$ factor: $1/3.375 = 0.296$.
> Combined: $\delta_{new} = 6 \times 3.842 \times 0.296 = 6.83\ \mathrm{mm}$
>
> **ETABS:** Build both beams, compare actual deflections — within a few percent.

## Chapter 28 — Exponential Functions

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Exponential** | "ex-poh-NEN-shul" | A function with the variable in the exponent | $y = a \cdot b^x$ |
| **Base** | — | The number being raised to a power | $b$ in $b^x$ |
| **Growth** | — | $b > 1$ — increases | Bacteria |
| **Decay** | — | $0 < b < 1$ — decreases | Radioactive decay |
| **Asymptote** | "AS-im-tote" | A line a curve approaches but never touches | x-axis for decay |
| **Euler's number** | "OY-ler" | $e \approx 2.71828$ | Natural growth |

### B. Concept Introduction

An exponential function has the variable as the exponent. Small input changes can produce huge output changes — exponentials grow (or decay) rapidly.

> **Real-world analogy:** Folding paper. Each fold doubles the thickness. After 30 folds, the stack is over 100 km tall. That is exponential growth.

### C. The Physics Behind It

In structural engineering, exponentials describe time-dependent behavior:
- **Concrete strength gain:** $f_c(t) = f_{c,28} \cdot \frac{t}{4 + 0.85 t}$ (a related curve)
- **Creep deformation:** $\varepsilon_{creep}(t) = \varepsilon_\infty (1 - e^{-t/\tau})$
- **Fatigue cycles to failure:** stress vs cycles often a power law (S-N curve), but cycle damage often modeled with exponentials
- **Damped vibration:** amplitude decays as $A_0 e^{-\zeta \omega t}$

### D. The Math

General form: $y = a \cdot b^x$ where $a$ = initial value, $b$ = growth factor.

For natural exponential: $y = a \cdot e^{kx}$ where $e \approx 2.71828$.
- $k > 0$: growth
- $k < 0$: decay

**Worked example.** Bacteria triple every hour. Starting at 100, find population after 5 hours.
$N(t) = 100 \cdot 3^t$ → $N(5) = 100 \cdot 243 = 24{,}300$.

**Worked example (decay).** A vibration amplitude $A_0 = 10$ mm decays with $\zeta = 0.05$ at frequency $\omega = 10$ rad/s. Amplitude after $t = 1$ s:
$A = 10 \cdot e^{-0.05 \cdot 10 \cdot 1} = 10 \cdot e^{-0.5} = 10 \cdot 0.6065 = 6.07\ \mathrm{mm}$

### E. Structural Engineering Application

**Problem (concrete creep).** Long-term creep deformation approaches a final value $\varepsilon_\infty = 0.001$. The time constant is $\tau = 200$ days. Find creep strain at $t = 100$ days.

$\varepsilon(100) = 0.001 (1 - e^{-100/200}) = 0.001 (1 - e^{-0.5}) = 0.001 (1 - 0.6065) = 0.001 \cdot 0.3935 = 0.000394$

So 39% of ultimate creep has occurred at 100 days.

### F. ETABS Connection

ETABS supports time-dependent material modeling for creep and shrinkage. **Define > Materials > Modify/Show > Time Dependent Properties** lets you specify the creep coefficient curve (often based on ACI or CEB-FIP, which use exponential / power-law forms).

> **Try it in ETABS 22:**
> 1. **Define > Materials > Concrete > Modify/Show**
> 2. Click **Time Dependent Properties**
> 3. Select ACI 209R-92 or CEB-FIP MC90 — both internally use exponential-style creep curves
> 4. Run a staged construction analysis to see creep effects accumulate over time

### G. Common Mistakes

1. **Confusing $b^x$ with $x^b$.** Exponential vs power; very different functions.
2. **Sign of decay exponent.** $e^{-kt}$ decays toward 0; $e^{+kt}$ explodes upward.
3. **Forgetting initial value.** $a$ scales the entire curve; without it the answer is off by orders of magnitude.

### H. Chapter Practice Task — Vibration Amplitude Decay

> **Scenario:** A floor vibrates with initial amplitude 5 mm. Damping constant gives decay factor $0.92$ per cycle (each cycle, amplitude drops to 92%). After how many cycles is amplitude < 1 mm?
>
> **Worked Solution:**
>
> $A(n) = 5 \cdot 0.92^n < 1$
> $0.92^n < 0.2$
> Taking logs (Chapter 29): $n \cdot \log 0.92 < \log 0.2$ → $n > \log 0.2 / \log 0.92 = -0.699 / -0.0362 = 19.3$
> Need 20 cycles.
>
> **ETABS:** Run **Time History Analysis** → plot acceleration response → confirm exponential decay envelope.

| Natural exponential | $y = a \cdot e^{kx}$ | Continuous processes | — |

## Chapter 29 — Logarithms

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Logarithm** | "LOG-ah-rith-um" | The inverse of an exponent | $\log_{10}, \ln$ |
| **Common log** | — | Base 10 logarithm | $\log_{10} 100 = 2$ |
| **Natural log** | "NACH-uh-rul" | Base $e$ logarithm | $\ln e = 1$ |
| **Order of magnitude** | — | A factor of 10 | $10^3$ vs $10^4$ |

### B. Concept Introduction

A logarithm answers the question: "what exponent do I need to put on this base to get this number?" If $10^2 = 100$, then $\log_{10} 100 = 2$.

> **Real-world analogy:** The Richter scale for earthquake magnitude is logarithmic. A magnitude-7 quake releases 10× the energy of magnitude-6, and 100× the energy of magnitude-5.

### C. The Physics Behind It

Logarithms appear wherever quantities span many orders of magnitude:
- Earthquake magnitudes (Richter scale)
- Sound levels (decibels)
- Soil consolidation (settlement vs log time)
- Fatigue (S-N curves often plotted log-log)
- Response spectrum diagrams (period axis often log scale)

### D. The Math

**Definitions:**
- $\log_{10} x$ = "log base 10 of x" = power of 10 that gives x
- $\ln x$ = $\log_e x$ = "natural log of x"

**Inverse of exponential:** $\log_b (b^x) = x$ and $b^{\log_b x} = x$.

**Log rules:**
- $\log(ab) = \log a + \log b$
- $\log(a/b) = \log a - \log b$
- $\log(a^n) = n \log a$

**Common values to know:**
- $\log_{10} 1 = 0$
- $\log_{10} 10 = 1$
- $\log_{10} 100 = 2$
- $\log_{10} 1000 = 3$
- $\ln 1 = 0$
- $\ln e = 1$
- $\ln 10 \approx 2.303$

**Worked example.** Solve $10^x = 500$ for $x$.
$x = \log_{10} 500 = \log_{10}(5 \cdot 100) = \log 5 + 2 = 0.699 + 2 = 2.699$

### E. Structural Engineering Application

**Problem (decibels).** A noise source has sound pressure $p = 0.5\ \mathrm{Pa}$. Reference is $p_0 = 2 \times 10^{-5}\ \mathrm{Pa}$. Find sound level in dB.

$L = 20 \log_{10}(p/p_0) = 20 \log_{10}(0.5 / 0.00002) = 20 \log_{10}(25{,}000) = 20 \cdot 4.398 = 87.96\ \mathrm{dB}$

**Problem (S-N curve).** Steel fatigue life $N$ at stress range $\Delta\sigma$ follows $\log N = 12 - 3 \log \Delta\sigma$. Find $N$ for $\Delta\sigma = 100\ \mathrm{MPa}$.

$\log N = 12 - 3 \log 100 = 12 - 6 = 6$ → $N = 10^6 = 1{,}000{,}000$ cycles.

### F. ETABS Connection

ETABS plots response spectra on log-log axes (period vs spectral acceleration). Reading these correctly requires understanding logs.

> **Try it in ETABS 22:**
> 1. **Define > Functions > Response Spectrum** → choose ASCE 7-22
> 2. The plot has logarithmic period axis (T)
> 3. A doubling of period corresponds to a fixed spacing on the log axis — not a fixed proportional spacing on a linear axis

### G. Common Mistakes

1. **Confusing $\log$ and $\ln$.** Default base in scientific contexts is often $e$ (natural); in engineering codes often 10. Read the context.
2. **Log of negative or zero.** $\log 0 = -\infty$; $\log(-x)$ is undefined for real numbers.
3. **Mishandling the log of a sum.** $\log(a + b) \neq \log a + \log b$.

### H. Chapter Practice Task — Earthquake Energy Ratio

> **Scenario:** Two earthquakes: M=6.0 and M=7.5. Energy ratio $E_2/E_1 = 10^{1.5(M_2 - M_1)}$. Find energy ratio.
>
> **Worked Solution:**
>
> $E_2/E_1 = 10^{1.5 \cdot 1.5} = 10^{2.25} = 177.8$ → 7.5 magnitude releases ~178× the energy of 6.0.
>
> **ETABS:** Although ETABS doesn't compute energy directly, the spectral acceleration scaling between magnitudes propagates into seismic load magnitudes — a 7.5 design region produces roughly an order-of-magnitude larger seismic forces than a 6.0 region.

## Chapter 30 — Matrices (Basic)

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Matrix** | "MAY-triks" | Rectangular grid of numbers | $[K]$ |
| **Matrices** | "MAY-trih-seez" | Plural of matrix | — |
| **Row** | "ROW" | Horizontal line of entries | First, second, ... row |
| **Column** | "KOL-um" | Vertical line of entries | First, second, ... column |
| **Element** | "EL-ih-ment" | One entry of the matrix | $a_{ij}$ |
| **Stiffness matrix** | "STIF-ness" | Matrix relating displacements to forces | $[K]$ |
| **Vector** | (see Ch 21) | Single column or row | $\{F\}$ |

### B. Concept Introduction

A matrix is a grid of numbers organized in rows and columns. ETABS's entire numerical engine is built on matrices — the **stiffness matrix** $[K]$ relates joint displacements $\{d\}$ to applied forces $\{F\}$ through:
$$[K]\{d\} = \{F\}$$

For a 5-story building, this matrix has thousands of rows and columns. Solving it is the "Run Analysis" step.

### C. The Physics Behind It

A simple spring: $F = k \cdot d$. One spring has one stiffness and one displacement. A real structure has thousands of joints, each with up to 6 DOFs, all connected by elements with their own stiffnesses. Stacking all these one-spring relations into a matrix equation is exactly the **stiffness method** — the foundation of every structural analysis software.

### D. The Math

**A 2×2 matrix:**
$A = \begin{bmatrix} 2 & 3 \\ 1 & 4 \end{bmatrix}$

**Addition** (same dimensions only): add corresponding elements.
$\begin{bmatrix} 1 & 2 \\ 3 & 4 \end{bmatrix} + \begin{bmatrix} 5 & 6 \\ 7 & 8 \end{bmatrix} = \begin{bmatrix} 6 & 8 \\ 10 & 12 \end{bmatrix}$

**Scalar multiplication:** multiply every element.
$3 \cdot \begin{bmatrix} 1 & 2 \\ 3 & 4 \end{bmatrix} = \begin{bmatrix} 3 & 6 \\ 9 & 12 \end{bmatrix}$

**Matrix multiplication** (rows × columns):
$\begin{bmatrix} a & b \\ c & d \end{bmatrix} \begin{bmatrix} x \\ y \end{bmatrix} = \begin{bmatrix} ax + by \\ cx + dy \end{bmatrix}$

**Worked example.**
$\begin{bmatrix} 2 & 3 \\ 1 & 4 \end{bmatrix} \begin{bmatrix} 5 \\ 6 \end{bmatrix} = \begin{bmatrix} 2(5) + 3(6) \\ 1(5) + 4(6) \end{bmatrix} = \begin{bmatrix} 28 \\ 29 \end{bmatrix}$

### E. Structural Engineering Application

**Problem.** A 2-DOF system: two springs in line, joints 1 and 2. Spring 1 (between ground and joint 1) has $k_1 = 1000\ \mathrm{kN/m}$. Spring 2 (between joints 1 and 2) has $k_2 = 500\ \mathrm{kN/m}$. Apply forces $F_1 = 0, F_2 = 10\ \mathrm{kN}$. Find displacements $d_1, d_2$.

The stiffness matrix:
$[K] = \begin{bmatrix} k_1 + k_2 & -k_2 \\ -k_2 & k_2 \end{bmatrix} = \begin{bmatrix} 1500 & -500 \\ -500 & 500 \end{bmatrix}$

Equation: $[K]\{d\} = \{F\}$:
$\begin{bmatrix} 1500 & -500 \\ -500 & 500 \end{bmatrix} \begin{bmatrix} d_1 \\ d_2 \end{bmatrix} = \begin{bmatrix} 0 \\ 10 \end{bmatrix}$

By inverting (or just solving the two equations):
$1500 d_1 - 500 d_2 = 0$ → $d_2 = 3 d_1$
$-500 d_1 + 500 d_2 = 10$ → $-500 d_1 + 1500 d_1 = 10$ → $d_1 = 10/1000 = 0.01\ \mathrm{m}$
Then $d_2 = 0.03\ \mathrm{m}$.

This trivial 2×2 example is the seed of all structural analysis software.

### F. ETABS Connection

When you click **Analyze > Run Analysis**, ETABS:
1. Builds the global stiffness matrix $[K]$ (potentially 10,000s of equations)
2. Builds the load vector $\{F\}$
3. Solves $\{d\} = [K]^{-1}\{F\}$ for displacements
4. Back-computes member forces from displacements

Every result you see — reactions, member forces, deflections — descends from this single matrix operation.

> **Try it in ETABS 22:**
> 1. After running analysis, **File > Show Output Files > Analysis Log**
> 2. Look for "Number of equations" or "Matrix factorization" — these are the stiffness matrix metrics
> 3. A 5-story 4-bay building typically has ~10,000–50,000 equations

### G. Common Mistakes

1. **Multiplying matrices in wrong order.** $[A][B] \neq [B][A]$ in general.
2. **Trying to add matrices of different sizes.** Forbidden.
3. **Not checking if matrix is invertible.** A singular stiffness matrix means the structure is unstable (a mechanism). ETABS will throw an error.

### H. Chapter Practice Task — Hand-Solve a 2×2 System

> **Scenario:** A 2-spring, 2-joint system with $k_1 = 800$, $k_2 = 400\ \mathrm{kN/m}$. Apply $F_1 = 5\ \mathrm{kN}$ at joint 1, $F_2 = -3\ \mathrm{kN}$ at joint 2. Find $d_1, d_2$.
>
> **Worked Solution:**
>
> $[K] = \begin{bmatrix} 1200 & -400 \\ -400 & 400 \end{bmatrix}$, $\{F\} = \begin{bmatrix} 5 \\ -3 \end{bmatrix}$
>
> Equations: $1200 d_1 - 400 d_2 = 5$ and $-400 d_1 + 400 d_2 = -3$
>
> Add: $800 d_1 = 2$ → $d_1 = 0.0025\ \mathrm{m}$
> Substitute: $-400(0.0025) + 400 d_2 = -3$ → $400 d_2 = -2$ → $d_2 = -0.005\ \mathrm{m}$
>
> **ETABS:** Build a 2-element 1D model with these stiffnesses, apply forces, run analysis, verify displacements.

| Stiffness matrix | $[K]$ from element stiffnesses | Building model | Built automatically |
| Matrix solve | $\{d\} = [K]^{-1}\{F\}$ | Find displacements | Run Analysis |

## Chapter 31 — Introduction to Vectors in 3D

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **3D vector** | — | Has three components $(x, y, z)$ | $\vec{F} = (F_x, F_y, F_z)$ |
| **Dot product** | — | Scalar result from two vectors | $\vec{A} \cdot \vec{B}$ |
| **Cross product** | — | Vector result, perpendicular to both | $\vec{A} \times \vec{B}$ |
| **Local axis** | — | Coordinate frame attached to a member | 1, 2, 3 axes per member |
| **Global axis** | — | The model's main coordinate system | X, Y, Z |
| **Right-hand rule** | — | Convention for cross-product direction | Curl fingers from A to B |

### B. Concept Introduction

3D structural models live in $(x, y, z)$ space. Every force, displacement, and member orientation is a 3D vector. Two new operations — **dot product** and **cross product** — give you angles and perpendicular directions, which are essential when working in 3D.

### C. The Physics Behind It

- Dot product gives the **angle between two vectors** and the **projection of one onto another**.
- Cross product gives a **vector perpendicular to both** — used to compute moment vectors $\vec{M} = \vec{r} \times \vec{F}$.

ETABS distinguishes between **global** axes (X, Y, Z, fixed for the whole model) and **local** axes (1, 2, 3, attached to each member). Rotations between them use these vector operations.

### D. The Math

**Dot product:**
$\vec{A} \cdot \vec{B} = A_x B_x + A_y B_y + A_z B_z = |A||B|\cos\theta$

**Cross product:**
$\vec{A} \times \vec{B} = (A_y B_z - A_z B_y,\ A_z B_x - A_x B_z,\ A_x B_y - A_y B_x)$

The result is a vector perpendicular to both $\vec{A}$ and $\vec{B}$, with magnitude $|A||B|\sin\theta$.

**Worked example.** $\vec{A} = (1, 2, 3)$, $\vec{B} = (4, 5, 6)$.

Dot product: $1 \cdot 4 + 2 \cdot 5 + 3 \cdot 6 = 4 + 10 + 18 = 32$

Magnitudes: $|A| = \sqrt{14} \approx 3.742$; $|B| = \sqrt{77} \approx 8.775$

Angle: $\cos\theta = 32 / (3.742 \cdot 8.775) = 0.974$ → $\theta = 12.93°$.

### E. Structural Engineering Application

**Problem.** A force $\vec{F} = (0, 0, -10)\ \mathrm{kN}$ acts at the tip of a cantilever whose tip is at position $\vec{r} = (3, 0, 0)\ \mathrm{m}$ from the fixed end. Find the moment vector at the fixed end.

$\vec{M} = \vec{r} \times \vec{F} = (3, 0, 0) \times (0, 0, -10)$

Using the formula:
$M_x = 0 \cdot (-10) - 0 \cdot 0 = 0$
$M_y = 0 \cdot 0 - 3 \cdot (-10) = 30$
$M_z = 3 \cdot 0 - 0 \cdot 0 = 0$

$\vec{M} = (0, 30, 0)\ \mathrm{kN \cdot m}$ — a moment about the global Y-axis, magnitude 30. This matches $F \cdot L = 10 \cdot 3 = 30\ \mathrm{kN \cdot m}$ from Chapter 12.

### F. ETABS Connection

ETABS uses local axes 1 (along member length), 2, 3 (perpendicular). When you assign a section, axis 3 is typically the strong axis (depth direction). A column rotated 90° has its strong axis swapped with its weak axis — bending response changes drastically.

> **Try it in ETABS 22:**
> 1. Select a column → **Assign > Frame > Local Axes** → set Angle = 0° vs 90°
> 2. Run analysis with same loads
> 3. Compare drift / moments — they reflect bending about a different principal axis

### G. Common Mistakes

1. **Confusing local and global axes.** A column's local axis 1 is along its length (vertical for typical column); global Z is also vertical, but the directions only coincide for vertical columns.
2. **Right-hand rule reversed.** Cross product direction matters. Curl right-hand fingers from $\vec{A}$ to $\vec{B}$; thumb points in the direction of $\vec{A} \times \vec{B}$.

### H. Chapter Practice Task — Verify a Reaction Moment

> **Scenario:** A 4 m horizontal cantilever, fixed at origin, free at $(4, 0, 0)$ m, carries a tip load $(0, -5, -10)$ kN (i.e., 5 kN sideways in -Y, 10 kN down in -Z). Find the moment vector at the fixed end.
>
> **Worked Solution:**
>
> $\vec{r} = (4, 0, 0)$, $\vec{F} = (0, -5, -10)$
> $\vec{M} = \vec{r} \times \vec{F}$:
> $M_x = 0 \cdot (-10) - 0 \cdot (-5) = 0$
> $M_y = 0 \cdot 0 - 4 \cdot (-10) = 40$
> $M_z = 4 \cdot (-5) - 0 \cdot 0 = -20$
> $\vec{M} = (0, 40, -20)\ \mathrm{kN \cdot m}$
>
> **ETABS:** Build the cantilever, apply both load components at tip, read fixed-end reactions $M_2 = 40$, $M_3 = -20$ (or signs per convention).

## Chapter 32 — Sequences and Series

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Sequence** | "SEE-kwens" | An ordered list of numbers | $a_1, a_2, a_3, \ldots$ |
| **Series** | "SEE-reez" | The sum of a sequence | $a_1 + a_2 + \ldots$ |
| **Term** | "TURM" | One number in a sequence | $a_n$ |
| **Arithmetic sequence** | "ar-ith-MET-ik" | Each term adds a constant | $2, 5, 8, 11, \ldots$ |
| **Geometric sequence** | "jee-oh-MET-rik" | Each term multiplies by a constant | $2, 6, 18, 54, \ldots$ |
| **Common difference** | — | The added constant in arithmetic | $d = 3$ |
| **Common ratio** | — | The multiplier in geometric | $r = 3$ |

### B. Concept Introduction

A sequence is a list. A series is the running sum of that list. They give compact notation for cumulative behavior — like the total axial load in a column at the bottom story (sum of every floor above).

### C. The Physics Behind It

A column at the ground floor carries everything above it. Story 1 column carries 1 floor's load. Story 5 column at the top carries... 0 floors above (just its own roof load). The cumulative axial loads form an arithmetic sequence going downward.

### D. The Math

**Arithmetic sequence:** $a_n = a_1 + (n-1) d$
**Sum of $n$ terms:** $S_n = \frac{n}{2}(2 a_1 + (n-1)d) = \frac{n}{2}(a_1 + a_n)$

**Geometric sequence:** $a_n = a_1 \cdot r^{n-1}$
**Sum of $n$ terms:** $S_n = a_1 \cdot \frac{1 - r^n}{1 - r}$ (for $r \neq 1$)

**Worked example.** Find the sum $1 + 2 + 3 + \ldots + 100$ (arithmetic, $a_1 = 1, d = 1, n = 100$).

$S = 100/2 \cdot (1 + 100) = 50 \cdot 101 = 5050$.

### E. Structural Engineering Application

**Problem.** A 10-story building has identical floors with floor load $P_{floor} = 200\ \mathrm{kN}$ per column. Find the cumulative axial load in each story's column.

| Story (from top) | Cumulative load |
|------------------|-----------------|
| 10 | $200$ |
| 9 | $400$ |
| 8 | $600$ |
| ... | ... |
| 1 | $2000$ |

The sequence is arithmetic: $a_n = 200n$ where $n$ counts floors above plus the one being supported.

The base column carries $S_{10} = 200 \cdot 10 = 2000$ kN — ten times the per-floor load. This is why lower-story columns are bigger.

### F. ETABS Connection

ETABS shows axial force in columns at each story. **Display > Show Frame Forces > Axial** — values increase linearly going down the column line.

> **Try it in ETABS 22:**
> 1. Build a 10-story building, identical floors, gravity-only load
> 2. Run analysis
> 3. Click any vertical column line, **Display Frame Forces > Axial**
> 4. The values at each story should match an arithmetic sequence — verifying load accumulation

### G. Common Mistakes

1. **Off-by-one errors.** Counting floors: is roof "floor 0" or "floor 10"? Define and stay consistent.
2. **Arithmetic vs geometric confusion.** Ask: "is each term added or multiplied?"
3. **Sum formula plugged with wrong $n$.** Use the count of terms, not the highest term.

### H. Chapter Practice Task — Cumulative Self-Weight

> **Scenario:** A 6-story building. Each story column has self-weight $W_{col} = 10\ \mathrm{kN}$ (its own self-weight, ignoring story-load). Find total self-weight contribution to the ground-floor column.
>
> **Worked Solution:**
>
> The ground column supports its own weight + 5 columns above = $6 \cdot 10 = 60\ \mathrm{kN}$ (or treat as $\sum 10$ over 6 terms = $60$).
>
> If load also accumulates from story dead/live loads, sum those too.
>
> **ETABS:** Verify by reading axial at base of column.

| Geometric sequence | $a_n = a_1 r^{n-1}$ | Tapering, wind profile | Wind pressure code |

## Chapter 33 — Limits — Conceptual Introduction

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Limit** | "LIM-it" | Value a function approaches as input approaches some value | $\lim_{x \to a} f(x)$ |
| **Approach** | — | Get arbitrarily close to | $x \to 3$ |
| **Converge** | "kon-VERJ" | Get closer and closer to a single value | Mesh refinement |
| **Diverge** | "dy-VERJ" | Grow without bound | Unstable structure |
| **Finite element method** | "FY-nite" | Numerical analysis using small elements | Foundation of ETABS |
| **Discretization** | "dis-kree-tih-ZAY-shun" | Cutting a continuous problem into pieces | Mesh |
| **Convergence study** | — | Check if mesh refinement gives stable result | FE verification |

### B. Concept Introduction

A limit answers: "what value does $f(x)$ approach as $x$ approaches some value?" Sometimes the function is undefined at the target value but the limit still exists.

> **Real-world analogy:** Walking halfway to a wall, then halfway again, then halfway again — you never touch the wall, but in the limit you arrive there. The wall is the "limit value."

### C. The Physics Behind It

ETABS uses the **finite element method (FEM)**. The continuous structure is broken into thousands of small elements. Each element approximates the real behavior. As elements get smaller, the FE solution converges to the exact mathematical solution — a limiting process.

This means:
- Coarse mesh → approximate, fast
- Fine mesh → accurate, slow
- A **convergence study** (running with progressively finer meshes) confirms results are reliable.

### D. The Math

Notation: $\lim_{x \to a} f(x) = L$ means as $x$ gets close to $a$, $f(x)$ gets close to $L$.

**Worked example.** $f(x) = x^2$. $\lim_{x \to 3} x^2 = 9$ (just plug in if continuous).

**Less trivial.** $f(x) = \dfrac{x^2 - 9}{x - 3}$ at $x = 3$ is $0/0$ — undefined. But:
$\dfrac{x^2 - 9}{x - 3} = \dfrac{(x-3)(x+3)}{x-3} = x + 3$ for $x \neq 3$
$\lim_{x \to 3} (x + 3) = 6$

The function approaches 6 even though it's not defined at 3.

### E. Structural Engineering Application

**Mesh convergence.** Suppose a slab's maximum deflection is computed with progressively finer meshes:

| Mesh size | $\delta_{\max}$ (mm) |
|-----------|----------------------|
| 2.0 m | 14.2 |
| 1.0 m | 11.8 |
| 0.5 m | 11.0 |
| 0.25 m | 10.8 |
| 0.125 m | 10.75 |

The values approach 10.7-10.8 mm — the **converged solution**. Going to finer meshes barely changes the answer; that's the limit.

### F. ETABS Connection

In **Assign > Area Object Mesh Options**, you set how finely ETABS subdivides slabs and walls. Coarser meshes converge to lower accuracy; finer meshes give better but slower results.

> **Try it in ETABS 22:**
> 1. Build a slab; assign coarse mesh (say 2 m max element size); run analysis; note max displacement
> 2. **Assign > Area Object Mesh Options** — refine to 0.5 m; re-run
> 3. Refine to 0.25 m; re-run
> 4. Plot results vs mesh size — they should converge to a stable value

### G. Common Mistakes

1. **Trusting a single mesh.** Always do a convergence study for unfamiliar geometry.
2. **Mistaking convergence for correctness.** Wrong boundary conditions converge to a wrong answer.
3. **Over-refining.** Beyond a certain point, the gain is negligible and computation time explodes.

### H. Chapter Practice Task — Mesh Convergence

> **Scenario:** A simply supported one-way slab 4 m × 6 m, 200 mm thick, $w = 5\ \mathrm{kPa}$. Run with three mesh sizes. Confirm the deflection converges.
>
> **Tasks:**
> 1. Build the slab once
> 2. Run with mesh size 1 m, 0.5 m, 0.25 m
> 3. Plot $\delta_{\max}$ vs mesh size
> 4. Identify the converged value
>
> **ETABS Workflow:**
> 1. Same model, **Assign > Area Object Mesh Options** for each run
> 2. Tabulate $\delta$ for each
> 3. The plot should flatten — that flat value is your converged answer

| Concept | Notation | Engineering Use | ETABS Location |
|---------|----------|----------------|----------------|
| Limit | $\lim_{x\to a} f(x)$ | Approach a value | — |
| Convergence | Stable result as mesh refines | FE verification | Mesh Options |
| FEM | Discretization of continuum | Whole-model analysis | Built into ETABS |

## Chapter 35 — Defining Materials

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Material** | "muh-TEER-ee-ul" | Substance an element is made of | Concrete, steel |
| **$f'_c$** | "F-prime-C" | Specified concrete compressive strength | Concrete |
| **$f_y$** | "F-Y" | Yield strength of reinforcement | Steel rebar |
| **$f_u$** | "F-U" | Ultimate tensile strength | Steel |
| **$E$** | (see Ch 16) | Modulus of elasticity | All materials |
| **Density** | "DEN-sih-tee" | Mass per unit volume | Self-weight |
| **Poisson's ratio** | "PWAH-sonz" | Lateral strain over axial strain | Material property |

### B. Concept Introduction

Before placing any element, you tell ETABS what the elements are made of. Each material gets a name and a property set. Common materials: **concrete** (define by $f'_c$), **rebar** (define by $f_y$), **structural steel** (define by $F_y, F_u$), **masonry**, **timber**.

### C. The Physics Behind It

Material properties drive:
- **Stiffness** ($E$) → how much the building deflects
- **Strength** ($f'_c, f_y, F_y$) → capacity checks
- **Self-weight** (density) → gravity loads added automatically

### D. The Math

Concrete modulus (ACI): $E_c = 4700 \sqrt{f'_c}\ \mathrm{MPa}$
For $f'_c = 30\ \mathrm{MPa}$: $E_c = 4700 \sqrt{30} = 4700 \cdot 5.477 = 25{,}742\ \mathrm{MPa}$

Steel modulus: $E_s = 200{,}000\ \mathrm{MPa}$ (constant for all structural steel).

### E. Structural Engineering Application

Typical properties to use in your tutorial model:

| Material | $f'_c$ or $F_y$ | $E$ | Density |
|----------|-----------------|-----|---------|
| Concrete C30/37 | $f'_c = 30$ MPa | 25,742 MPa | 25 kN/m³ |
| Rebar B500 | $f_y = 500$ MPa | 200,000 MPa | 78.5 kN/m³ |
| Steel S355 | $F_y = 355$ MPa | 200,000 MPa | 78.5 kN/m³ |

### F. ETABS Connection — The Mini-Task

> **Mini-Task: Define concrete and rebar.**
>
> 1. **Define > Material Properties**
> 2. Click **Add New Material** → choose region/standard (e.g., Eurocode, ACI)
> 3. **Concrete C30**: name "C30", $f'_c = 30$ MPa, weight per unit volume = 25 kN/m³, $E$ auto-computed
> 4. **Rebar B500**: name "B500", $f_y = f_u = 500$ MPa
> 5. **Steel S355** (optional): name "S355", $F_y = 355$, $F_u = 510$ MPa
> 6. OK to close

### G. Common Mistakes

1. **Using "concrete" without specifying $f'_c$.** ETABS defaults may not match your design code expectations.
2. **Forgetting to set rebar.** Concrete sections need both concrete + rebar materials defined before you can design.
3. **Wrong density.** If you set 0, no self-weight; if you double it, gravity loads double.

## Chapter 36 — Defining Section Properties

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Section** | "SEK-shun" | Cross-section shape and size | Beam C-30x60 |
| **Frame section** | — | Section for beams and columns | Define menu |
| **Slab section** | — | Section for floor slabs | Membrane / Shell |
| **Wall section** | — | Section for shear walls | Shell-thin |
| **Cover** | — | Concrete distance from rebar to surface | RC sections |
| **Reinforcement** | "ree-in-FORS-ment" | Steel bars inside concrete | Rebar |

### B. Concept Introduction

A section ties a material + a shape + reinforcement (for RC) into a single named property. You then assign sections to elements. Standard names: "C-30x60" (column 300×600 mm), "B-25x50" (beam 250×500 mm), "S-150" (slab 150 mm thick).

### C. The Physics Behind It

Section properties control:
- **Bending stiffness** $EI$ → deflection, period
- **Axial stiffness** $EA$ → axial deformation
- **Shear capacity** → shear design
- **Self-weight per length** = density × area

### D. The Math

For a rectangular concrete section $b \times h$:
- Area $A = bh$
- Moment of inertia $I_x = bh^3/12$ (Chapter 20)
- Section modulus $S_x = I_x / (h/2) = bh^2/6$

For $b = 300$ mm, $h = 600$ mm:
$A = 180{,}000\ \mathrm{mm^2} = 0.18\ \mathrm{m^2}$
$I_x = 300 \cdot 600^3 / 12 = 5.4 \times 10^9\ \mathrm{mm^4}$

### E. Structural Engineering Application

Tutorial-building sections:

| Section name | Type | Material | Dimensions | Reinforcement |
|--------------|------|----------|------------|---------------|
| C-50x50 | Column | C30 | 500×500 mm | 8Ø20 longitudinal, Ø8/200 ties |
| B-30x60 | Beam | C30 | 300×600 mm | Auto |
| S-180 | Slab | C30 | 180 mm | Auto |
| W-250 | Wall | C30 | 250 mm | Auto |

### F. ETABS Connection — The Mini-Task

> **Mini-Task: Define sections.**
>
> 1. **Define > Section Properties > Frame Sections**
> 2. **Add New Property** > **Concrete Rectangular** > set name "C-50x50", depth = 0.50, width = 0.50, material = C30, rebar = B500, cover 40 mm, set 8Ø20 corner+intermediate bars
> 3. Repeat for "B-30x60" beam: 0.30 × 0.60, set as beam
> 4. **Define > Section Properties > Slab Sections** → "S-180", thickness 180 mm, type = Shell-thin (or Membrane for simple two-way slab)
> 5. **Define > Section Properties > Wall Sections** → "W-250", thickness 250 mm

### G. Common Mistakes

1. **Forgetting cover.** Default cover may differ from your code.
2. **Using "membrane" when you need "shell".** Membrane has no out-of-plane stiffness — wrong for slabs that bend!
3. **Wrong axis orientation.** A 300×600 column oriented wrong has weak-axis bending where you wanted strong-axis.

## Chapter 37 — Building the Structural Model

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Draw** | — | Place an element graphically | Draw menu |
| **Replicate** | "REP-lih-kayt" | Copy elements to other locations | Edit > Replicate |
| **Joint** | — | A node where elements meet | Joint = node |
| **Frame** | — | A column or beam (1D element) | Line element |
| **Area** | — | A slab or wall (2D element) | Surface element |
| **Restraint** | "ree-STRAYNT" | A support condition at a joint | Pin, fixed, roller |
| **Diaphragm** | "DY-uh-fram" | A rigid-floor constraint | Slab tying joints |

### B. Concept Introduction

You now place columns, beams, slabs, and walls onto the grid. ETABS provides drawing tools for each element type. Replicate features let you build one story and copy it up.

### C. The Physics Behind It

Each element brings its physics:
- Columns: axial + bending + shear
- Beams: bending + shear + (sometimes axial)
- Slabs: out-of-plane bending + in-plane membrane (diaphragm)
- Walls: in-plane shear (primary) + out-of-plane bending

Restraints define how the building is connected to the ground — usually fixed or pinned at the base.

### D. The Math

The model's degrees of freedom (DOFs) drive the size of $[K]$. For a 5-story 4×3-bay building:
- Joints per story: $5 \times 4 = 20$
- Stories: 6 (including ground)
- Total joints: 120
- DOFs per joint: 6 (3 trans + 3 rot)
- Total DOFs: 720 (before diaphragm reduction)

### E. Structural Engineering Application

**Order of operations** for the tutorial model:

1. **Draw columns** at every grid intersection on Story 1
2. **Replicate columns** vertically through all stories
3. **Draw beams** along grid lines on each floor
4. **Draw slabs** as rectangular areas filling each bay
5. **Draw walls** (if any) along selected grid lines
6. **Assign restraints** to base joints (fully fixed)
7. **Assign rigid diaphragm** to each floor

### F. ETABS Connection — The Mini-Task

> **Mini-Task: Build a 1-story prototype.**
>
> 1. **Plan view** of Story 1
> 2. **Draw > Draw Frames/Cables/Tendons > Quick Draw Columns** — click each grid intersection. Select section "C-50x50".
> 3. **Draw > Draw Frames/Cables/Tendons > Quick Draw Beams** — click each grid line; section "B-30x60".
> 4. **Draw > Draw Floor/Slab > Quick Draw Floors/Walls** — click each bay; section "S-180".
> 5. Switch to elevation; you should see columns and a slab at story 1.
> 6. Select all (Ctrl+A) → **Edit > Replicate > Story** → repeat for stories 2–5.
> 7. **Plan view of Base** → select all base joints → **Assign > Joint > Restraints** → choose Fixed (all 6 DOFs).
> 8. Select all slabs at each story → **Assign > Shell > Diaphragm** → New > "D1" (rigid).
> 9. **File > Save**.

### G. Common Mistakes

1. **Missing joints.** Beams not connected to columns (drawn slightly off the grid intersection) act as floating elements.
2. **Skipping diaphragm assignment.** Without a rigid diaphragm, lateral analysis gives meaningless mode shapes.
3. **Forgetting base restraints.** Without supports, the model is unstable; ETABS will warn.

## Chapter 38 — Applying Loads

### A. Word Bank

| Word | Pronunciation | Plain English Meaning | Used In |
|------|---------------|----------------------|---------|
| **Load pattern** | — | A named, non-combined source of load | "DL", "LL", "EQX" |
| **Load case** | — | An analysis under one or more patterns | Linear static, modal |
| **Load combination** | "kom-bih-NAY-shun" | Sum of patterns with factors | $1.2D + 1.6L$ |
| **Dead load (D)** | — | Permanent self-weight | Self-weight + finishes |
| **Live load (L)** | — | Movable use load | Furniture, occupants |
| **Wind load (W)** | — | Pressure from wind | Per code |
| **Seismic / Earthquake (E)** | "size-MIK" | Inertial load from ground motion | Code spectrum |

### B. Concept Introduction

Loads are organized in three layers:
1. **Load patterns** — what the load *is* (DL, LL, etc.)
2. **Load cases** — how to *analyze* a pattern (statically, modally, time history, response spectrum)
3. **Load combinations** — code-mandated sums (e.g., $1.2D + 1.6L$, $1.2D + 1.0E + 1.0L$)

### C. The Physics Behind It

- **Dead load**: gravity × material density × volume
- **Live load**: gravity × occupancy load (per code, e.g., 2.4 kPa for office)
- **Wind**: dynamic pressure $q = \frac{1}{2}\rho v^2$ converted to surface pressures
- **Seismic**: inertia $F = m \cdot a$ where $a$ comes from response spectrum × design factors

### D. The Math

Code load combinations (ASCE 7):
- $1.4D$
- $1.2D + 1.6L$
- $1.2D + 1.0L + 1.0E$
- $0.9D + 1.0E$

For a column with $D = 500$ kN, $L = 200$ kN, $E = 100$ kN:
- $1.4D = 700$
- $1.2D + 1.6L = 920$
- $1.2D + 1.0L + 1.0E = 900$ (or $700$ if $E$ negative)
- $0.9D + 1.0E = 450 + 100 = 550$ (or $350$)

Design uses the worst case: 920 kN.

### E. Structural Engineering Application

For the tutorial building (office occupancy):

| Pattern | Type | Magnitude |
|---------|------|-----------|
| DL | Dead | Self-weight (auto) + 1.5 kPa finishes |
| LL | Live | 2.4 kPa typical floors, 1.0 kPa roof |
| EQX | Seismic X | Per response spectrum |
| EQY | Seismic Y | Per response spectrum |
| WX | Wind X | Per code wind speed |
| WY | Wind Y | Per code wind speed |

### F. ETABS Connection — The Mini-Task

> **Mini-Task: Define and apply loads.**
>
> 1. **Define > Load Patterns** → add: DL (Dead, self weight multiplier 1), LL (Live, 0), EQX (Seismic, auto-lateral = ASCE 7 / IBC), EQY (Seismic Y)
> 2. **Apply finishes:** select all slabs, **Assign > Shell Loads > Uniform** → DL = 1.5 kPa
> 3. **Apply live load:** select all slabs, **Assign > Shell Loads > Uniform** → LL = 2.4 kPa
> 4. **Define > Load Cases** → review auto-generated cases (DL, LL static; EQX, EQY)
> 5. **Define > Load Combinations** → **Add Default Design Combos** → choose ACI/ASCE → ETABS generates standard $1.4D$, $1.2D + 1.6L$, etc.
> 6. Save.

### G. Common Mistakes

1. **Setting self-weight multiplier on multiple patterns.** Only ONE pattern should include self-weight (typically DL with multiplier 1). Otherwise weight is double-counted.
2. **Wrong load units.** Applying 2.4 in a model with kN-mm gives 2.4 kN/mm² instead of kN/m².
3. **Missing live load reduction.** For large tributary areas, codes allow LL reduction; not modeling it can be conservative — but applying without code basis is wrong.

### H. Chapter Practice Task — Define Full Load Set
